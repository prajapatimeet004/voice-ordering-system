<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pooja - Voice Ordering</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #ff8c00;
            --primary-gradient: linear-gradient(135deg, #ff8c00, #ff4500);
            --bg-gradient: linear-gradient(135deg, #fdf2e9 0%, #fdebd0 100%);
            --glass: rgba(255, 255, 255, 0.85);
            --text-dark: #2d3436;
            --text-muted: #636e72;
            --card-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }

        /* Table Selection Screen */
        #table-screen {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .logo-large {
            font-size: 3.5rem;
            font-weight: 950;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .table-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .table-card {
            background: var(--glass);
            padding: 2.5rem;
            border-radius: 32px;
            border: 2px solid #fff;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .table-card:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .table-card i {
            color: var(--primary);
            width: 40px;
            height: 40px;
        }

        .table-card b {
            font-size: 1.4rem;
            font-weight: 800;
        }

        /* Order Screen */
        #order-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
        }

        .active-table-badge {
            background: #fff;
            padding: 0.6rem 1.5rem;
            border-radius: 100px;
            font-weight: 800;
            font-size: 1rem;
            box-shadow: var(--card-shadow);
            border: 1px solid #eee;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .mic-container {
            position: relative;
            margin: 2rem 0;
        }

        .mic-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--primary-gradient);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 40px rgba(255, 69, 0, 0.4);
            z-index: 2;
            position: relative;
            transition: transform 0.2s;
        }

        .mic-btn:active {
            transform: scale(0.9);
        }

        .mic-btn i {
            color: #fff;
            width: 60px;
            height: 60px;
        }

        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0.3;
            z-index: 1;
            display: none;
        }

        .recording .pulse-ring {
            display: block;
            animation: ring-pulse 1.5s infinite;
        }

        @keyframes ring-pulse {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .assistant-card {
            background: var(--glass);
            padding: 2rem;
            border-radius: 35px;
            width: 100%;
            min-height: 150px;
            box-shadow: var(--card-shadow);
            border: 1px solid #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        #transcript {
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-style: italic;
        }

        #assistant-reply {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1.3;
        }

        .action-footer {
            display: flex;
            gap: 1rem;
            width: 100%;
            margin-top: 2rem;
        }

        .secondary-btn {
            background: #fff;
            border: 1px solid #eee;
            padding: 1.2rem;
            border-radius: 20px;
            flex: 1;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .primary-btn {
            background: #2d3436;
            color: #fff;
            border: none;
            padding: 1.2rem;
            border-radius: 20px;
            flex: 1.5;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- SCREEN 1: TABLE SELECTION -->
        <div id="table-screen">
            <h1 class="logo-large">Pooja</h1>
            <p class="subtitle">Select your table to start ordering</p>
            <div class="table-grid">
                <div class="table-card" onclick="selectTable('1')">
                    <i data-lucide="utensils"></i>
                    <b>Table 1</b>
                </div>
                <div class="table-card" onclick="selectTable('2')">
                    <i data-lucide="utensils"></i>
                    <b>Table 2</b>
                </div>
                <div class="table-card" onclick="selectTable('3')">
                    <i data-lucide="utensils"></i>
                    <b>Table 3</b>
                </div>
                <div class="table-card" onclick="selectTable('4')">
                    <i data-lucide="utensils"></i>
                    <b>Table 4</b>
                </div>
            </div>
        </div>

        <!-- SCREEN 2: VOICE ORDERING -->
        <div id="order-screen">
            <div class="active-table-badge">
                <i data-lucide="map-pin" style="width:16px;"></i>
                Table <span id="selected-table-id">1</span>
            </div>

            <div class="mic-container" id="mic-container">
                <div class="pulse-ring"></div>
                <button class="mic-btn" id="mic-btn">
                    <i data-lucide="mic"></i>
                </button>
            </div>

            <div class="assistant-card">
                <p id="transcript">Tap the mic to order...</p>
                <p id="assistant-reply">"Jai Shri Krishna! What can I get for you today?"</p>
            </div>

            <div class="action-footer">
                <button class="secondary-btn" onclick="goBack()">
                    <i data-lucide="arrow-left" style="width:18px;"></i> Back
                </button>
                <button class="primary-btn" onclick="finishOrder()">
                    FINISH & PAY
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin === 'null' || window.location.origin === 'file://'
            ? "http://127.0.0.1:8000"
            : window.location.origin;

        let currentTableId = null;
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];

        function selectTable(id) {
            currentTableId = id;
            document.getElementById('selected-table-id').innerText = id;
            document.getElementById('table-screen').style.display = 'none';
            document.getElementById('order-screen').style.display = 'flex';
            lucide.createIcons();
        }

        function goBack() {
            document.getElementById('table-screen').style.display = 'flex';
            document.getElementById('order-screen').style.display = 'none';
        }

        const micBtn = document.getElementById('mic-btn');
        const micContainer = document.getElementById('mic-container');
        const transcriptText = document.getElementById('transcript');
        const assistantReply = document.getElementById('assistant-reply');

        micBtn.onclick = async () => {
            if (!isRecording) startRecording();
            else stopRecording();
        };

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    sendAudio(audioBlob);
                };
                mediaRecorder.start();
                isRecording = true;
                micContainer.classList.add('recording');
                transcriptText.innerText = "Listening...";
                assistantReply.innerText = "Listening to your request...";
            } catch (err) {
                alert("Microphone access denied.");
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            micContainer.classList.remove('recording');
            transcriptText.innerText = "Processing...";
        }

        async function sendAudio(blob) {
            try {
                const transcribeData = new FormData();
                transcribeData.append('audio', blob, 'recording.wav');

                const tResponse = await fetch(`${API_URL}/order/transcribe`, { method: 'POST', body: transcribeData });
                const tResult = await tResponse.json();

                if (tResult.transcript) {
                    transcriptText.innerText = `"${tResult.transcript}"`;

                    const classifyData = new FormData();
                    classifyData.append('transcript', tResult.transcript);
                    classifyData.append('table_id', currentTableId);

                    const cResponse = await fetch(`${API_URL}/order/classify`, { method: 'POST', body: classifyData });
                    const cResult = await cResponse.json();

                    assistantReply.innerText = cResult.response_text || "Order updated!";
                    if (cResult.speech) { new Audio(`data:audio/wav;base64,${cResult.speech}`).play(); }
                } else {
                    transcriptText.innerText = "No speech detected.";
                    assistantReply.innerText = "Sorry, I didn't catch that. Could you repeat?";
                }
            } catch (err) {
                console.error(err);
                transcriptText.innerText = "Error processing.";
            }
        }

        async function finishOrder() {
            if (!confirm(`Finalize your order for Table ${currentTableId}?`)) return;
            const res = await fetch(`${API_URL}/order/submit?table_id=${currentTableId}`, { method: 'POST' });
            const data = await res.json();
            alert(data.message);
            location.reload(); // Reset to table selection
        }

        lucide.createIcons();
    </script>
</body>

</html>
