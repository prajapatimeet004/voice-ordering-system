<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pooja - Voice Ordering</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #ff8c00;
            --primary-gradient: linear-gradient(135deg, #ff8c00, #ff4500);
            --bg-gradient: linear-gradient(135deg, #fdf2e9 0%, #fdebd0 100%);
            --glass: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #1a1a1a;
            --text-muted: #636e72;
            --card-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            --accent-glow: rgba(255, 140, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Glows */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
            animation: float 20s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
        }

        .bg-glow-1 {
            top: -10%;
            left: -10%;
        }

        .bg-glow-2 {
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 50px) scale(1.1);
            }
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }

        /* Table Selection Screen */
        #table-screen {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .logo-large {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -2px;
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .table-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .table-card {
            background: var(--glass);
            padding: 2.5rem;
            border-radius: 35px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            animation: cardReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
            backdrop-filter: blur(12px);
        }

        .table-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .table-card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .table-card:nth-child(3) {
            animation-delay: 0.3s;
        }

        .table-card:nth-child(4) {
            animation-delay: 0.4s;
        }

        .table-card:hover {
            transform: scale(1.08) translateY(-10px);
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 30px 70px rgba(255, 140, 0, 0.15);
        }

        .table-card i {
            color: var(--primary);
            width: 40px;
            height: 40px;
        }

        .table-card b {
            font-size: 1.4rem;
            font-weight: 800;
        }

        /* ===================== ORDER SCREEN - SPLIT LAYOUT ===================== */
        #order-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            background: var(--bg-gradient);
        }

        .order-layout {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* LEFT PANEL - Menu */
        .menu-panel {
            width: 45%;
            height: 100vh;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .menu-panel-header {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .menu-panel-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .menu-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.2rem;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .menu-scroll-area::-webkit-scrollbar {
            width: 5px;
        }

        .menu-scroll-area::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .menu-category {
            margin-bottom: 1rem;
        }

        .category-header {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.75rem;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .menu-item-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 0.6rem 0.8rem;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: default;
        }

        .menu-item-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.1);
        }

        .menu-item-name {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-dark);
            margin-bottom: 0.15rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .menu-item-price {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* RIGHT PANEL - Voice Ordering */
        .voice-panel {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            gap: 1.5rem;
            position: relative;
        }

        .active-table-badge {
            background: #fff;
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            font-weight: 800;
            font-size: 0.9rem;
            box-shadow: var(--card-shadow);
            border: 1px solid #eee;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            position: absolute;
            top: 1.2rem;
            right: 1.5rem;
        }

        .mic-container {
            position: relative;
        }

        .mic-btn {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: var(--primary-gradient);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 40px rgba(255, 69, 0, 0.4);
            z-index: 2;
            position: relative;
            transition: transform 0.2s;
        }

        .mic-btn:active {
            transform: scale(0.9);
        }

        .mic-btn i {
            color: #fff;
            width: 50px;
            height: 50px;
        }

        .pulse-ring,
        .pulse-ring-2 {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--primary);
            z-index: 1;
            display: none;
        }

        .pulse-ring {
            opacity: 0.3;
        }

        .pulse-ring-2 {
            opacity: 0.2;
            z-index: 0;
        }

        .recording .pulse-ring {
            display: block;
            animation: ring-pulse 2s infinite ease-out;
        }

        .recording .pulse-ring-2 {
            display: block;
            animation: ring-pulse 2s infinite ease-out 0.5s;
        }

        @keyframes ring-pulse {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }

            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .assistant-card {
            background: var(--glass);
            padding: 1.5rem 2rem;
            border-radius: 28px;
            width: 100%;
            max-width: 420px;
            min-height: 120px;
            box-shadow: var(--card-shadow);
            border: 1px solid #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        #transcript {
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            font-style: italic;
            font-size: 0.9rem;
        }

        #assistant-reply {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.3;
        }

        .action-footer {
            display: flex;
            gap: 0.8rem;
            width: 100%;
            max-width: 420px;
        }

        .secondary-btn {
            background: #fff;
            border: 1px solid #eee;
            padding: 1rem;
            border-radius: 18px;
            flex: 1;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .primary-btn {
            background: #2d3436;
            color: #fff;
            border: none;
            padding: 1rem;
            border-radius: 18px;
            flex: 1.5;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            font-size: 0.9rem;
        }

        /* Branding in voice panel */
        .voice-branding {
            position: absolute;
            top: 1.2rem;
            left: 1.5rem;
        }

        .voice-branding h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
    </style>
</head>

<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="container">
        <!-- SCREEN 1: TABLE SELECTION -->
        <div id="table-screen">
            <h1 class="logo-large">Pooja</h1>
            <p class="subtitle">Select your table to start ordering</p>
            <div class="table-grid">
                <div class="table-card" onclick="selectTable('1')">
                    <i data-lucide="utensils"></i>
                    <b>Table 1</b>
                </div>
                <div class="table-card" onclick="selectTable('2')">
                    <i data-lucide="utensils"></i>
                    <b>Table 2</b>
                </div>
                <div class="table-card" onclick="selectTable('3')">
                    <i data-lucide="utensils"></i>
                    <b>Table 3</b>
                </div>
                <div class="table-card" onclick="selectTable('4')">
                    <i data-lucide="utensils"></i>
                    <b>Table 4</b>
                </div>
            </div>
        </div>
    </div>

    <!-- SCREEN 2: VOICE ORDERING (Full-screen split layout) -->
    <div id="order-screen">
        <div class="order-layout">
            <!-- LEFT: Menu Panel -->
            <div class="menu-panel">
                <div class="menu-panel-header">
                    <i data-lucide="book-open" style="width:20px; color: var(--primary);"></i>
                    <h2>Our Menu</h2>
                </div>
                <div class="menu-scroll-area" id="menu-items-container">
                    <p style="color: var(--text-muted); font-style: italic;">Loading menu...</p>
                </div>
            </div>

            <!-- RIGHT: Voice Ordering Panel -->
            <div class="voice-panel">
                <div class="voice-branding">
                    <h1>Pooja</h1>
                </div>

                <div class="active-table-badge">
                    <i data-lucide="map-pin" style="width:14px;"></i>
                    Table <span id="selected-table-id">1</span>
                </div>

                <div class="mic-container" id="mic-container">
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring-2"></div>
                    <button class="mic-btn" id="mic-btn">
                        <i data-lucide="mic"></i>
                    </button>
                </div>

                <div class="assistant-card">
                    <p id="transcript">Tap the mic to order...</p>
                    <p id="assistant-reply">"Jai Shri Krishna! What can I get for you today?"</p>
                </div>

                <div class="action-footer">
                    <button class="secondary-btn" onclick="goBack()">
                        <i data-lucide="arrow-left" style="width:16px;"></i> Back
                    </button>
                    <button class="primary-btn" onclick="finishOrder()">
                        FINISH & PAY
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin === 'null' || window.location.origin === 'file://'
            ? "http://127.0.0.1:8000"
            : window.location.origin;

        let currentTableId = null;
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];

        const CATEGORY_EMOJIS = {
            'Main Course': '🍛',
            'South Indian': '🥘',
            'Starters': '🍢',
            'Snacks': '🍟',
            'Dessert': '🍮',
            'Breads': '🫓',
            'Beverages': '☕',
            'Fast Food': '🍔'
        };

        function selectTable(id) {
            currentTableId = id;
            document.getElementById('selected-table-id').innerText = id;
            document.getElementById('table-screen').style.display = 'none';
            document.querySelector('.container').style.display = 'none';
            document.getElementById('order-screen').style.display = 'block';
            loadMenu();
            lucide.createIcons();
        }

        async function loadMenu() {
            try {
                const res = await fetch(`${API_URL}/menu/details`);
                const menuData = await res.json();
                renderMenu(menuData);
            } catch (err) {
                console.error('Failed to load menu:', err);
                document.getElementById('menu-items-container').innerHTML =
                    '<p style="color:#e74c3c;">Could not load menu.</p>';
            }
        }

        function renderMenu(menuData) {
            const container = document.getElementById('menu-items-container');
            // Group by category
            const categories = {};
            for (const [dish, info] of Object.entries(menuData)) {
                const cat = info.category || 'Other';
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push({ name: dish, price: info.price });
            }

            let html = '';
            for (const [cat, items] of Object.entries(categories)) {
                const emoji = CATEGORY_EMOJIS[cat] || '🍽️';
                html += `<div class="menu-category">`;
                html += `<div class="category-header">${emoji} ${cat}</div>`;
                html += `<div class="menu-grid">`;
                items.forEach((item) => {
                    html += `
                        <div class="menu-item-card">
                            <div class="menu-item-name">${item.name}</div>
                            <div class="menu-item-price">₹${item.price}</div>
                        </div>`;
                });
                html += `</div></div>`;
            }
            container.innerHTML = html;
        }

        function goBack() {
            document.getElementById('order-screen').style.display = 'none';
            document.querySelector('.container').style.display = '';
            document.getElementById('table-screen').style.display = 'flex';
        }

        const micBtn = document.getElementById('mic-btn');
        const micContainer = document.getElementById('mic-container');
        const transcriptText = document.getElementById('transcript');
        const assistantReply = document.getElementById('assistant-reply');

        micBtn.onclick = async () => {
            if (!isRecording) startRecording();
            else stopRecording();
        };

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    sendAudio(audioBlob);
                };
                mediaRecorder.start();
                isRecording = true;
                micContainer.classList.add('recording');
                transcriptText.innerText = "Listening...";
                assistantReply.innerText = "Listening to your request...";
            } catch (err) {
                alert("Microphone access denied.");
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            micContainer.classList.remove('recording');
            transcriptText.innerText = "Processing...";
        }

        async function sendAudio(blob) {
            try {
                const transcribeData = new FormData();
                transcribeData.append('audio', blob, 'recording.wav');

                const tResponse = await fetch(`${API_URL}/order/transcribe`, { method: 'POST', body: transcribeData });
                const tResult = await tResponse.json();

                if (tResult.transcript) {
                    transcriptText.innerText = `"${tResult.transcript}"`;

                    const classifyData = new FormData();
                    classifyData.append('transcript', tResult.transcript);
                    classifyData.append('table_id', currentTableId);

                    const cResponse = await fetch(`${API_URL}/order/classify`, { method: 'POST', body: classifyData });
                    const cResult = await cResponse.json();

                    assistantReply.innerText = cResult.response_text || "Order updated!";
                    if (cResult.speech) { new Audio(`data:audio/wav;base64,${cResult.speech}`).play(); }
                } else {
                    transcriptText.innerText = "No speech detected.";
                    assistantReply.innerText = "Sorry, I didn't catch that. Could you repeat?";
                }
            } catch (err) {
                console.error(err);
                transcriptText.innerText = "Error processing.";
            }
        }

        async function finishOrder() {
            if (!confirm(`Finalize your order for Table ${currentTableId}?`)) return;
            const res = await fetch(`${API_URL}/order/submit?table_id=${currentTableId}`, { method: 'POST' });
            const data = await res.json();
            alert(data.message);
            location.reload();
        }

        lucide.createIcons();
    </script>
</body>

</html>
