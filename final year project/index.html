<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pooja — Voice Ordering</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0a0e14;
            --surface: #111820;
            --surface-elevated: #151e2c;
            --border: #1e2a3a;
            --border-strong: #2a3a4a;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-muted: rgba(99, 102, 241, 0.12);
            --text: #f1f5f9;
            --text-dim: #6b7c93;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.4);
            --transition: 200ms cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 6px;
        }

        /* ═══════════ TABLE SELECTION ═══════════ */

        #selection-container {
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        #table-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .logo-large {
            font-family: 'Outfit', sans-serif;
            font-size: 44px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -1.5px;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 36px;
        }

        .table-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
        }

        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--transition);
            min-height: 130px;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .table-card:hover {
            background: var(--surface-elevated);
            border-color: var(--border-strong);
        }

        .table-card:active {
            transform: scale(0.97);
        }

        .table-card i {
            color: var(--accent);
            width: 28px;
            height: 28px;
        }

        .table-card b {
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }

        /* ═══════════ ORDER SCREEN ═══════════ */

        #order-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            background: var(--bg);
        }

        .order-layout {
            display: grid;
            grid-template-columns: 340px 1fr;
            height: 100vh;
        }

        /* ── MENU PANEL ── */

        .menu-panel {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .menu-panel-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .menu-panel-header i {
            width: 22px;
            color: var(--accent);
        }

        .menu-panel-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }

        .menu-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px 24px;
        }

        .menu-category {}
        .menu-category:first-child .category-header {
            margin-top: 0;
        }

        .category-header {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 24px 0 12px;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            cursor: default;
        }

        .menu-item-card:hover {
            border-color: var(--accent);
            background: var(--surface-elevated);
        }

        .item-name {
            font-weight: 500;
            font-size: 15px;
            color: var(--text);
        }

        .item-price {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 15px;
            color: var(--accent);
            white-space: nowrap;
            margin-left: 12px;
        }

        /* ── VOICE PANEL ── */

        .voice-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 32px;
        }

        .mic-selector-container {
            position: absolute;
            top: 24px;
            left: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .settings-icon {
            color: var(--text-dim);
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .mic-select {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            outline: none;
            max-width: 200px;
            transition: var(--transition);
            -webkit-appearance: none;
            appearance: none;
        }

        .mic-select:hover {
            border-color: var(--accent);
        }
        .mic-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-muted);
        }

        .active-table-badge {
            position: absolute;
            top: 24px;
            right: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 13px;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        /* ── VAD STATUS ── */

        .vad-status {
            display: inline-flex;
            align-items: center;
            padding: 7px 16px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: var(--transition);
            border: 1px solid var(--border);
            color: var(--text-dim);
            background: var(--surface);
        }

        .vad-status.active {
            background: var(--accent-muted);
            border-color: rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
        }

        .vad-status.listening {
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            animation: pulseBadge 1s ease-in-out infinite;
        }

        .vad-status.processing {
            background: var(--accent-muted);
            border-color: rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
        }

        @keyframes pulseBadge {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* ── VISUALIZER ── */

        .visualizer {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 48px;
            opacity: 0;
            transition: opacity 300ms ease;
        }

        #order-screen.recording .visualizer {
            opacity: 1;
        }

        .bar {
            width: 4px;
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            animation: barBounce 0.8s ease-in-out infinite;
            transform-origin: bottom;
        }

        .bar:nth-child(1) {
            animation-delay: 0s;
        }
        .bar:nth-child(2) {
            animation-delay: 0.1s;
        }
        .bar:nth-child(3) {
            animation-delay: 0.2s;
        }
        .bar:nth-child(4) {
            animation-delay: 0.3s;
        }
        .bar:nth-child(5) {
            animation-delay: 0.1s;
        }
        .bar:nth-child(6) {
            animation-delay: 0.4s;
        }
        .bar:nth-child(7) {
            animation-delay: 0.2s;
        }

        @keyframes barBounce {
            0%,
            100% {
                height: 8px;
            }
            50% {
                height: 48px;
            }
        }

        /* ── MIC BUTTON ── */

        .mic-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .mic-btn {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            box-shadow: var(--shadow-sm);
            position: relative;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .mic-btn i {
            color: var(--text-dim);
            width: 36px;
            height: 36px;
            transition: var(--transition);
        }

        .mic-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 0.3px;
            text-transform: uppercase;
            transition: var(--transition);
        }

        /* VAD ACTIVE — waiting for speech */
        .mic-btn.vad-on {
            background: var(--accent-muted);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15), var(--shadow-md);
        }

        .mic-btn.vad-on i {
            color: var(--accent);
        }

        /* LISTENING — recording speech */
        #order-screen.recording .mic-btn {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 0 8px rgba(99, 102, 241, 0.2), var(--shadow-md);
            animation: micPulse 1.5s ease-in-out infinite;
        }

        #order-screen.recording .mic-btn i {
            color: #fff;
            width: 40px;
            height: 40px;
        }

        @keyframes micPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        /* PROCESSING */
        .vad-status.processing~.mic-container .mic-btn {
            background: var(--surface);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12), var(--shadow-md);
            animation: processingBreathe 1.2s ease-in-out infinite;
        }

        .vad-status.processing~.mic-container .mic-btn i {
            color: var(--accent);
        }

        .vad-status.processing~.mic-container .mic-label {
            color: var(--accent);
        }

        @keyframes processingBreathe {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(0.96);
            }
        }

        /* ── ASSISTANT CARD ── */

        .assistant-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            width: 100%;
            max-width: 520px;
            text-align: center;
            margin-top: 8px;
        }

        #assistant-reply {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.35;
        }

        #transcript {
            margin-top: 14px;
            color: var(--text-dim);
            font-size: 14px;
            font-style: italic;
        }

        /* ── ACTION FOOTER ── */

        .action-footer {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            min-height: 52px;
            font-family: 'Inter', sans-serif;
            text-decoration: none;
        }

        .btn i {
            width: 18px;
            height: 18px;
        }

        .btn-sec {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-sec:hover {
            background: var(--surface-elevated);
            border-color: var(--border-strong);
        }

        .btn-pri {
            background: var(--accent);
            color: #fff;
        }

        .btn-pri:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* ═══════════ RESPONSIVE ═══════════ */

        @media (max-width: 767px) {
            .order-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }

            .menu-panel {
                max-height: 35vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .menu-panel-header {
                padding: 16px 20px;
            }

            .menu-scroll-area {
                padding: 12px 16px 16px;
            }

            .voice-panel {
                padding: 24px 20px;
                gap: 0;
                overflow-y: auto;
            }

            .mic-selector-container {
                position: static;
                margin-bottom: 4px;
            }

            .active-table-badge {
                position: static;
            }

            .mic-btn {
                width: 80px;
                height: 80px;
            }

            .mic-btn i {
                width: 30px;
                height: 30px;
            }

            .assistant-card {
                padding: 20px;
                max-width: 100%;
            }

            #assistant-reply {
                font-size: 18px;
            }

            .btn {
                padding: 12px 20px;
                min-height: 48px;
                font-size: 14px;
            }

            .action-footer {
                flex-direction: row;
                width: 100%;
                max-width: 520px;
            }

            .action-footer .btn {
                flex: 1;
                justify-content: center;
            }
        }

        @media (max-width: 479px) {
            .table-grid {
                grid-template-columns: 1fr;
            }

            .table-card {
                min-height: 100px;
                padding: 20px;
            }

            #selection-container {
                padding: 16px;
            }

            .logo-large {
                font-size: 36px;
            }

            .subtitle {
                font-size: 11px;
                margin-bottom: 28px;
            }

            .mode-switcher {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>

<body>

    <!-- ═══ TABLE SELECTION SCREEN ═══ -->
    <div class="container" id="selection-container">
        <div id="table-screen">
            <h1 class="logo-large">Pooja</h1>
            <p class="subtitle">Premium Voice Ordering</p>
            <div class="table-grid">
                <div class="table-card" onclick="selectTable('1')">
                    <i data-lucide="utensils"></i>
                    <b>Table 1</b>
                </div>
                <div class="table-card" onclick="selectTable('2')">
                    <i data-lucide="utensils"></i>
                    <b>Table 2</b>
                </div>
                <div class="table-card" onclick="selectTable('3')">
                    <i data-lucide="utensils"></i>
                    <b>Table 3</b>
                </div>
                <div class="table-card" onclick="selectTable('4')">
                    <i data-lucide="utensils"></i>
                    <b>Table 4</b>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ VOICE ORDERING SCREEN ═══ -->
    <div id="order-screen">
        <div class="order-layout">

            <!-- LEFT: Menu Panel -->
            <div class="menu-panel">
                <div class="menu-panel-header">
                    <i data-lucide="command" style="width:22px; color: var(--accent);"></i>
                    <h2>Menu</h2>
                </div>
                <div class="menu-scroll-area" id="menu-items-container">
                    <p style="color: var(--text-dim); font-style: italic;">Syncing menu...</p>
                </div>
            </div>

            <!-- RIGHT: Voice Ordering Panel -->
            <div class="voice-panel">

                <!-- Microphone Selector -->
                <div class="mic-selector-container">
                    <i data-lucide="settings" class="settings-icon"></i>
                    <select id="mic-select" class="mic-select">
                        <option value="default">Default Mic</option>
                    </select>
                </div>

                <!-- Active Table Badge -->
                <div class="active-table-badge">
                    TABLE <span id="selected-table-id">1</span>
                </div>

                <!-- VAD Status -->
                <div class="vad-status" id="vad-status">&#x25cf; VAD OFF</div>

                <!-- Visualizer -->
                <div class="visualizer" id="visualizer">
                    <div class="bar"></div>
                    <div class="bar" style="animation-delay: 0.1s"></div>
                    <div class="bar" style="animation-delay: 0.2s"></div>
                    <div class="bar" style="animation-delay: 0.3s"></div>
                    <div class="bar" style="animation-delay: 0.1s"></div>
                    <div class="bar" style="animation-delay: 0.4s"></div>
                    <div class="bar" style="animation-delay: 0.2s"></div>
                </div>

                <!-- Mic Button -->
                <div class="mic-container" id="mic-container">
                    <button class="mic-btn" id="mic-btn">
                        <i data-lucide="mic" style="width:50px; height:50px; color:#fff;"></i>
                    </button>
                    <p class="mic-label" id="mic-label">TAP TO START LISTENING</p>
                </div>

                <!-- Assistant Card -->
                <div class="assistant-card">
                    <p id="assistant-reply">"Jai Shri Krishna! Ready for your order."</p>
                    <p id="transcript" style="margin-top:1rem; opacity:0.6; font-size:0.9rem;">Tap mic to activate...
                    </p>
                </div>

                <!-- Action Footer -->
                <div class="action-footer">
                    <button class="btn btn-sec" onclick="goBack()">
                        <i data-lucide="chevron-left" style="width:20px;"></i> Exit
                    </button>
                    <button class="btn btn-pri" onclick="finishOrder()">
                        Complete Order
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin === 'null' || window.location.origin === 'file://'
            ? "http://127.0.0.1:8000"
            : window.location.origin;

        let currentTableId = null;

        // ─── VAD Configuration ──────────────────────────────────────────
        const SPEECH_THRESHOLD = 25; // RMS volume (0-255) to count as speech
        const SILENCE_DURATION = 1500; // ms of silence before auto-sending

        // ─── VAD Runtime State ──────────────────────────────────────────
        let vadActive = false; // VAD toggle (mic btn tap)
        let isProcessing = false; // locked while API is in-flight or TTS playing
        let isSpeaking = false; // currently recording a speech chunk
        let silenceTimer = null;
        let audioChunks = [];
        let mediaRecorder = null;
        let micStream = null;
        let audioCtx = null;
        let analyser = null;
        let animFrameId = null;
        let audioWs = null;
        let selectedMicId = 'default';

        // ─── UI Elements ────────────────────────────────────────────────
        const micBtn = document.getElementById('mic-btn');
        const micLabel = document.getElementById('mic-label');
        const vadStatusEl = document.getElementById('vad-status');
        const transcriptEl = document.getElementById('transcript');
        const replyEl = document.getElementById('assistant-reply');
        const micSelect = document.getElementById('mic-select');

        const CATEGORY_EMOJIS = {
            'Main Course': '&#x1F35B;',
            'South Indian': '&#x1F958;',
            'Starters': '&#x1F362;',
            'Snacks': '&#x1F35F;',
            'Dessert': '&#x1F36E;',
            'Breads': '&#x1FAD3;',
            'Beverages': '&#x2615;',
            'Fast Food': '&#x1F354;'
        };

        // ─── Table / Menu ────────────────────────────────────────────────
        function selectTable(id) {
            currentTableId = id.startsWith('table_') ? id : `table_${id}`;
            document.getElementById('selected-table-id').innerText = id.replace('table_', '');
            document.getElementById('table-screen').style.display = 'none';
            document.getElementById('selection-container').style.display = 'none';
            document.getElementById('order-screen').style.display = 'block';
            loadMenu();
            lucide.createIcons();
            // Auto-init VAD when entering the order screen
            updateMicList().then(() => initVAD());
        }

        async function updateMicList() {
            try {
                // Request permission first to get labels
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(t => t.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const mics = devices.filter(d => d.kind === 'audioinput');

                micSelect.innerHTML = mics.map(m =>
                    `<option value="${m.deviceId}">${m.label || `Microphone ${m.deviceId.slice(0, 5)}`}</option>`
                ).join('');

                if (mics.length > 0 && !mics.find(m => m.deviceId === selectedMicId)) {
                    selectedMicId = mics[0].deviceId;
                    micSelect.value = selectedMicId;
                }
            } catch (err) {
                console.error("Error enumerating devices:", err);
            }
        }

        micSelect.addEventListener('change', (e) => {
            selectedMicId = e.target.value;
            console.log("Selected Microphone:", selectedMicId);
            if (vadActive) {
                stopVAD();
                initVAD();
            }
        });

        async function loadMenu() {
            try {
                const res = await fetch(`${API_URL}/menu/details`);
                const menuData = await res.json();
                renderMenu(menuData);
            } catch (err) {
                document.getElementById('menu-items-container').innerHTML =
                    '<p style="color:#e74c3c;">Could not load menu.</p>';
            }
        }

        function renderMenu(menuData) {
            const container = document.getElementById('menu-items-container');
            const categories = {};
            for (const [dish, info] of Object.entries(menuData)) {
                const cat = info.category || 'Other';
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push({ name: dish, price: info.price });
            }
            let html = '';
            for (const [cat, items] of Object.entries(categories)) {
                const emoji = CATEGORY_EMOJIS[cat] || '&#x1F37D;';
                html += `<div class="menu-category">
                        <div class="category-header">${emoji} ${cat}</div>
                        <div class="menu-grid">`;
                items.forEach(item => {
                    html += `<div class="menu-item-card">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">&#x20B9;${item.price}</div>
                        </div>`;
                });
                html += `</div></div>`;
            }
            container.innerHTML = html;
        }

        function goBack() {
            stopVAD();
            document.getElementById('order-screen').style.display = 'none';
            document.getElementById('selection-container').style.display = '';
            document.getElementById('table-screen').style.display = 'flex';
        }

        // ─── VAD Core ─────────────────────────────────────────────────────
        async function initVAD() {
            if (vadActive) return;
            try {
                console.log("[VAD] Requesting microphone access...");
                const constraints = {
                    audio: selectedMicId === 'default' ? true : { deviceId: { exact: selectedMicId } },
                    video: false
                };
                micStream = await navigator.mediaDevices.getUserMedia(constraints);
                console.log("[VAD] Microphone acquired, stream active:", micStream.active);

                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                const source = audioCtx.createMediaStreamSource(micStream);
                source.connect(analyser);

                vadActive = true;
                setVADStatus('active');
                monitorVolume();

            } catch (err) {
                console.error("[VAD] Microphone access denied:", err.message);
                alert("Microphone access denied. VAD requires mic permission.");
                vadActive = false;
            }
        }

        function stopVAD() {
            console.log("[VAD] stopVAD called");
            vadActive = false;
            if (animFrameId) { cancelAnimationFrame(animFrameId);
                animFrameId = null; }
            if (silenceTimer) { clearTimeout(silenceTimer);
                silenceTimer = null; }

            // Stop MediaRecorder FIRST — onstop fires async and needs audioWs to send stop
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                console.log("[VAD] Stopping active MediaRecorder during stopVAD");
                mediaRecorder.stop();
            }

            // Defer WS cleanup — let onstop use audioWs, then close after it fires
            if (audioWs) {
                const ws = audioWs;
                const cleanup = () => {
                    cleanupAudioWs(ws);
                    if (audioWs === ws) audioWs = null;
                };
                if (ws.readyState === WebSocket.CONNECTING) {
                    let done = false;
                    ws.addEventListener('open', () => {
                        done = true;
                        try { ws.send(JSON.stringify({ action: "stop" })); } catch (e) {}
                        setTimeout(cleanup, 1500);
                    }, { once: true });
                    setTimeout(() => { if (!done) cleanup(); }, 5000);
                } else if (ws.readyState === WebSocket.OPEN) {
                    setTimeout(cleanup, 2000);
                } else {
                    cleanup();
                }
            }

            if (micStream) {
                micStream.getTracks().forEach(t => t.stop());
                console.log("[VAD] Microphone tracks stopped");
            }
            if (audioCtx) audioCtx.close();
            micStream = null;
            audioCtx = null;
            analyser = null;
            mediaRecorder = null;
            isSpeaking = false;
            isProcessing = false;
            document.getElementById('order-screen').classList.remove('recording');
            micBtn.classList.remove('vad-on');
            setVADStatus('off');
        }

        function monitorVolume() {
            if (!vadActive || !analyser) return;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function tick() {
                if (!vadActive) return;
                animFrameId = requestAnimationFrame(tick);

                analyser.getByteFrequencyData(dataArray);
                const rms = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;

                if (rms > SPEECH_THRESHOLD) {
                    if (silenceTimer) { clearTimeout(silenceTimer);
                        silenceTimer = null; }
                    if (!isSpeaking && !isProcessing) {
                        onSpeechStart();
                    }
                } else {
                    if (isSpeaking && !silenceTimer) {
                        silenceTimer = setTimeout(onSpeechEnd, SILENCE_DURATION);
                    }
                }
            }
            tick();
        }

        function cleanupAudioWs(ws) {
            if (!ws) return;
            try {
                ws.onopen = null;
                ws.onmessage = null;
                ws.onerror = null;
                ws.onclose = null;
                ws.close();
            } catch (e) {}
        }

        function onSpeechStart() {
            // Guard: validate micStream before proceeding
            if (!micStream || !(micStream instanceof MediaStream) || micStream.active === false) {
                console.error("[VAD] onSpeechStart: invalid micStream", micStream);
                isSpeaking = false;
                return;
            }

            isSpeaking = true;
            console.log("[VAD] onSpeechStart: speech detected, starting recording flow");

            // Close any existing WebSocket
            if (audioWs) {
                cleanupAudioWs(audioWs);
                audioWs = null;
            }

            // Create MediaRecorder synchronously BEFORE WebSocket to avoid race.
            // Buffer chunks in-flight; they will be sent once WS opens.
            try {
                console.log("[MR] Creating MediaRecorder with stream, active:", micStream.active);
                mediaRecorder = new MediaRecorder(micStream);
            } catch (err) {
                console.error("[MR] Failed to create MediaRecorder:", err);
                isSpeaking = false;
                return;
            }

            let pendingChunks = [];
            let recorderActive = false;

            mediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) {
                    if (audioWs && audioWs.readyState === WebSocket.OPEN) {
                        console.log("[Audio] Sending chunk:", e.data.size, "bytes");
                        audioWs.send(e.data);
                    } else {
                        pendingChunks.push(e.data);
                    }
                }
            };

            mediaRecorder.onstop = () => {
                console.log("[MR] MediaRecorder stopped");
                recorderActive = false;
                if (audioWs && audioWs.readyState === WebSocket.OPEN) {
                    console.log("[WS] Sending stop signal to server");
                    audioWs.send(JSON.stringify({ action: "stop" }));
                } else if (audioWs && audioWs.readyState === WebSocket.CONNECTING) {
                    console.log("[WS] WS still connecting, will flush chunks + send stop once open");
                    audioWs.addEventListener('open', () => {
                        try {
                            // Flush buffered audio chunks before stop signal
                            for (const chunk of pendingChunks) {
                                if (audioWs.readyState === WebSocket.OPEN) audioWs.send(chunk);
                            }
                            pendingChunks = [];
                            audioWs.send(JSON.stringify({ action: "stop" }));
                        } catch (e) {
                            console.warn("[WS] Failed to send stop on late open:", e);
                        }
                    }, { once: true });
                } else {
                    console.warn("[WS] No open WS on recorder stop, unlocking VAD");
                    isProcessing = false;
                    isSpeaking = false;
                    setVADStatus('active');
                }
            };

            // Start recorder with 100ms timeslices
            try {
                mediaRecorder.start(100);
                recorderActive = true;
                console.log("[MR] MediaRecorder started (timeslice=100ms)");
            } catch (err) {
                console.error("[MR] Failed to start MediaRecorder:", err);
                mediaRecorder = null;
                isSpeaking = false;
                return;
            }

            // Open WebSocket Connection
            let wsUrl = API_URL.replace("http", "ws");
            if (wsUrl === "file://") { wsUrl = "ws://127.0.0.1:8000"; }

            console.log("[WS] Connecting to", `${wsUrl}/order/stream_audio`);
            const ws = new WebSocket(`${wsUrl}/order/stream_audio`);
            audioWs = ws;

            // Max recording duration: force-stop after 30s even if VAD doesn't detect silence
            let maxRecordingTimeout = setTimeout(() => {
                if (isSpeaking && mediaRecorder && mediaRecorder.state === 'recording') {
                    console.warn("[VAD] Max recording duration (30s) reached, forcing stop");
                    mediaRecorder.stop();
                }
            }, 30000);

            // Safety timeout: if server never responds within 60s, force-stop recorder
            let wsResponseTimeout = setTimeout(() => {
                console.warn("[WS] Response timeout (60s) — forcing stop.");
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();  // triggers onstop → sends stop via WS
                } else {
                    // Recorder already stopped but no response — unlock manually
                    isProcessing = false;
                    isSpeaking = false;
                    mediaRecorder = null;
                    setVADStatus('active');
                    transcriptEl.innerText = "Timeout. Try again.";
                }
            }, 60000);

            function clearTimeouts() {
                if (wsResponseTimeout) {
                    clearTimeout(wsResponseTimeout);
                    wsResponseTimeout = null;
                }
                if (maxRecordingTimeout) {
                    clearTimeout(maxRecordingTimeout);
                    maxRecordingTimeout = null;
                }
            }

            ws.onopen = () => {
                if (audioWs !== ws) {
                    console.log("[WS] Stale onopen ignored");
                    return;
                }
                console.log("[WS] Connection opened");

                // Send start signal
                ws.send(JSON.stringify({ action: "start", table_id: currentTableId }));

                // Flush any chunks that were buffered before WS opened
                if (pendingChunks.length > 0) {
                    console.log("[Audio] Flushing", pendingChunks.length, "buffered chunks");
                    for (const chunk of pendingChunks) {
                        if (ws.readyState === WebSocket.OPEN) {
                            ws.send(chunk);
                        }
                    }
                    pendingChunks = [];
                }
            };

            let pendingResult = null;

            ws.onmessage = (e) => {
                if (audioWs !== ws) return;

                let cResult;
                try { cResult = JSON.parse(e.data); } catch { return; }

                const unlockVAD = () => {
                    isProcessing = false;
                    isSpeaking = false;
                    setVADStatus('active');
                };

                // Message 2: TTS audio arrived separately
                if (cResult.type === "tts_audio" && cResult.speech) {
                    console.log("[TTS] Playing audio response");
                    const audio = new Audio(`data:audio/mp3;base64,${cResult.speech}`);
                    const onAudioDone = () => {
                        if (pendingResult && pendingResult.is_finished) {
                            setTimeout(() => {
                                alert("Order submitted successfully!");
                                location.reload();
                            }, 500);
                        }
                    };
                    audio.onended = onAudioDone;
                    audio.onerror = onAudioDone;
                    audio.play().catch(onAudioDone);
                    return;
                }

                // Message 1: Text result
                clearTimeouts();
                pendingResult = cResult;

                if (cResult.error) {
                    const errMsg = cResult.error;
                    if (errMsg.includes('No audio') || errMsg.includes('No speech')) {
                        transcriptEl.innerText = "No speech detected. Please try again.";
                        replyEl.innerText = "Didn't catch that, try again.";
                    } else {
                        transcriptEl.innerText = "Error: " + errMsg;
                        replyEl.innerText = "Sorry, could not process that.";
                    }
                    unlockVAD();
                    return;
                }

                if (cResult.transcript) transcriptEl.innerText = `"${cResult.transcript}"`;
                replyEl.innerText = cResult.response_text || "Order updated!";

                unlockVAD();

                if (cResult.is_finished && !cResult.response_text) {
                    setTimeout(() => {
                        alert("Order submitted successfully!");
                        location.reload();
                    }, 500);
                }
            };

            ws.onerror = (err) => {
                if (audioWs !== ws) return;
                console.error("[WS] Error:", err);
                clearTimeouts();
                // Stop recorder if active
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    try { mediaRecorder.stop(); } catch (e) {}
                }
                isProcessing = false;
                isSpeaking = false;
                mediaRecorder = null;
                setVADStatus('active');
                transcriptEl.innerText = "Connection error. Tap mic to retry.";
                replyEl.innerText = "Network issue. Please try again.";
            };

            ws.onclose = (event) => {
                if (audioWs !== ws) return;
                console.log("[WS] Closed (code=" + event.code + ", reason=" + event.reason + ")");
                clearTimeouts();
                audioWs = null;
                // Stop recorder if still active
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    try { mediaRecorder.stop(); } catch (e) {}
                    mediaRecorder = null;
                }
                // Only unlock if we were waiting for a response
                if (isProcessing || isSpeaking) {
                    isProcessing = false;
                    isSpeaking = false;
                    setVADStatus('active');
                }
            };

            document.getElementById('order-screen').classList.add('recording');
            setVADStatus('listening');
            transcriptEl.innerText = "Listening...";
            replyEl.innerText = "I'm listening...";
        }

        function onSpeechEnd() {
            if (!isSpeaking) return;
            isSpeaking = false;
            isProcessing = true;
            silenceTimer = null;
            console.log("[VAD] onSpeechEnd: silence detected, stopping recording");

            if (mediaRecorder && mediaRecorder.state === 'recording') {
                try { mediaRecorder.requestData(); } catch (e) {}
                console.log("[MR] Stopping MediaRecorder");
                mediaRecorder.stop();
                mediaRecorder = null;
            } else if (audioWs && audioWs.readyState === WebSocket.OPEN) {
                console.log("[WS] No active recorder, sending stop directly");
                audioWs.send(JSON.stringify({ action: "stop" }));
            } else if (audioWs && audioWs.readyState === WebSocket.CONNECTING) {
                console.log("[WS] WS still connecting, will send stop once open");
                audioWs.addEventListener('open', () => {
                    try {
                        audioWs.send(JSON.stringify({ action: "stop" }));
                    } catch (e) {
                        console.warn("[WS] Failed to send stop on late open:", e);
                    }
                }, { once: true });
            } else {
                console.warn("[VAD] onSpeechEnd: no recorder or WS, unlocking VAD");
                isProcessing = false;
                isSpeaking = false;
                setVADStatus('active');
                transcriptEl.innerText = "Ready.";
                return;
            }

            document.getElementById('order-screen').classList.remove('recording');
            setVADStatus('processing');
            transcriptEl.innerText = "Processing...";
        }

        // ─── API Calls ────────────────────────────────────────────────────
        async function sendAudio(blob) {
            try {
                // Step 1: Transcribe
                const tForm = new FormData();
                tForm.append('audio', blob, 'recording.wav');
                const tRes = await fetch(`${API_URL}/order/transcribe`, { method: 'POST', body: tForm });
                const tResult = await tRes.json();

                if (tResult.transcript) {
                    transcriptEl.innerText = `"${tResult.transcript}"`;

                    // Step 2: Classify / LLM
                    const cForm = new FormData();
                    cForm.append('transcript', tResult.transcript);
                    cForm.append('table_id', currentTableId);
                    const cRes = await fetch(`${API_URL}/order/classify`, { method: 'POST', body: cForm });
                    const cResult = await cRes.json();

                    replyEl.innerText = cResult.response_text || "Order updated!";

                    if (cResult.speech) {
                        // Wait for TTS to finish before unlocking VAD
                        const audio = new Audio(`data:audio/wav;base64,${cResult.speech}`);
                        audio.onended = () => { isProcessing = false;
                            setVADStatus('active'); };
                        audio.onerror = () => { isProcessing = false;
                            setVADStatus('active'); };
                        audio.play();
                    } else {
                        isProcessing = false;
                        setVADStatus('active');
                    }

                } else {
                    transcriptEl.innerText = "No speech detected.";
                    replyEl.innerText = "Sorry, I didn't catch that. Could you repeat?";
                    isProcessing = false;
                    setVADStatus('active');
                }
            } catch (err) {
                console.error(err);
                transcriptEl.innerText = "Error processing.";
                isProcessing = false;
                setVADStatus('active'); // always unlock on error
            }
        }

        // ─── Mic Button = VAD Toggle ──────────────────────────────────────
        micBtn.onclick = async () => {
            if (!vadActive) {
                console.log("[UI] Mic button clicked, starting VAD");
                await initVAD();
                if (vadActive) {
                    micBtn.classList.add('vad-on');
                    transcriptEl.innerText = "Say something...";
                }
            } else {
                console.log("[UI] Mic button clicked, stopping VAD");
                stopVAD();
                transcriptEl.innerText = "Tap mic to restart.";
                replyEl.innerText = "Microphone off.";
            }
        };

        // ─── VAD UI Status Helper ─────────────────────────────────────────
        function setVADStatus(state) {
            vadStatusEl.className = 'vad-status';
            switch (state) {
                case 'active':
                    vadStatusEl.className += ' active';
                    vadStatusEl.innerHTML = '&#x25cf; VAD ACTIVE &mdash; Waiting for speech';
                    micLabel.innerText = 'TAP TO STOP LISTENING';
                    micBtn.classList.add('vad-on');
                    break;
                case 'listening':
                    vadStatusEl.className += ' listening';
                    vadStatusEl.innerHTML = '&#x1F3A4; RECORDING...';
                    micLabel.innerText = 'SPEAKING...';
                    break;
                case 'processing':
                    vadStatusEl.className += ' processing';
                    vadStatusEl.innerHTML = '&#x23F3; PROCESSING...';
                    micLabel.innerText = 'WAIT FOR REPLY';
                    break;
                default: // 'off'
                    vadStatusEl.innerHTML = '&#x25cf; VAD OFF';
                    micLabel.innerText = 'TAP TO START LISTENING';
                    micBtn.classList.remove('vad-on');
                    break;
            }
        }

        // ─── Order Submission ─────────────────────────────────────────────
        async function finishOrder() {
            if (!confirm(`Finalize your order for Table ${currentTableId}?`)) return;
            const res = await fetch(`${API_URL}/order/submit?table_id=${currentTableId}`, { method: 'POST' });
            const data = await res.json();
            alert(data.message);
            location.reload();
        }

        lucide.createIcons();
    </script>
