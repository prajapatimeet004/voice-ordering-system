<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pooja - Voice Ordering</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --secondary: #f59e0b;
            --bg-deep: #0f172a;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-heavy: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --accent-glow: rgba(99, 102, 241, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-deep);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Modern Mesh Background */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: #0f172a;
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
            filter: blur(100px);
            opacity: 0.6;
        }

        .bg-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(99, 102, 241, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
            animation: float 25s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% {
                transform: translate(-10%, -10%) scale(1);
            }

            100% {
                transform: translate(10%, 10%) scale(1.2);
            }
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
            z-index: 10;
        }

        /* Table Selection Screen */
        .logo-large {
            font-family: 'Outfit', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -3px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            letter-spacing: 1px;
        }

        .table-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .table-card {
            background: var(--glass);
            padding: 2.5rem;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            backdrop-filter: blur(20px);
        }

        .table-card:hover {
            background: var(--glass-heavy);
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
        }

        .table-card i {
            color: var(--primary);
            width: 48px;
            height: 48px;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        .table-card b {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }

        /* ===================== ORDER SCREEN ===================== */
        #order-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            background: #020617;
        }

        .order-layout {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .menu-panel {
            width: 400px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(40px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
        }

        .menu-panel-header {
            padding: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .menu-panel-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
        }

        .menu-scroll-area {
            flex: 1;
            padding: 0 2rem 2rem;
            overflow-y: auto;
        }

        .category-header {
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 2rem 0 1rem;
        }

        .menu-item-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .menu-item-card:hover {
            border-color: var(--primary);
            background: var(--glass-heavy);
        }

        .item-name {
            font-weight: 600;
            color: #fff;
        }

        .item-price {
            font-weight: 800;
            color: var(--secondary);
        }

        .voice-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
            position: relative;
        }

        .active-table-badge {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: var(--glass-heavy);
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            font-weight: 700;
        }

        /* Advanced Waveform Visualizer */
        .visualizer {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 60px;
            margin-bottom: 2rem;
            opacity: 0;
            transition: 0.5s;
        }

        .recording .visualizer {
            opacity: 1;
        }

        .bar {
            width: 4px;
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            animation: bounce 0.8s infinite ease-in-out;
        }

        @keyframes bounce {

            0%,
            100% {
                height: 10px;
            }

            50% {
                height: 60px;
            }
        }

        .mic-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: var(--primary-gradient);
            border: 4px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            box-shadow: 0 0 50px var(--accent-glow);
            transition: 0.4s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .recording .mic-btn {
            transform: scale(1.1);
            box-shadow: 0 0 80px var(--primary);
            border-color: #fff;
        }

        .assistant-card {
            margin-top: 3rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 40px;
            width: 500px;
            text-align: center;
            backdrop-filter: blur(20px);
        }

        #assistant-reply {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .action-footer {
            margin-top: 2rem;
            display: flex;
            gap: 1.5rem;
        }

        .btn {
            padding: 1.25rem 2.5rem;
            border-radius: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-size: 1rem;
        }

        .btn-sec {
            background: var(--glass-heavy);
            color: #fff;
        }

        .btn-pri {
            background: #fff;
            color: #000;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="mesh-bg"></div>
    <div class="bg-glow"></div>

    <div class="container" id="selection-container">
        <!-- SCREEN 1: TABLE SELECTION -->
        <div id="table-screen">
            <h1 class="logo-large">Pooja</h1>
            <p class="subtitle">PREMIUM VOICE ORDERING</p>
            <div class="table-grid">
                <div class="table-card" onclick="selectTable('1')">
                    <i data-lucide="utensils"></i>
                    <b>Table 1</b>
                </div>
                <div class="table-card" onclick="selectTable('2')">
                    <i data-lucide="utensils"></i>
                    <b>Table 2</b>
                </div>
                <div class="table-card" onclick="selectTable('3')">
                    <i data-lucide="utensils"></i>
                    <b>Table 3</b>
                </div>
                <div class="table-card" onclick="selectTable('4')">
                    <i data-lucide="utensils"></i>
                    <b>Table 4</b>
                </div>
            </div>
        </div>
    </div>

    <!-- SCREEN 2: VOICE ORDERING -->
    <div id="order-screen">
        <div class="order-layout">
            <!-- LEFT: Menu Panel -->
            <div class="menu-panel">
                <div class="menu-panel-header">
                    <i data-lucide="command" style="width:24px; color: var(--primary);"></i>
                    <h2>Menu</h2>
                </div>
                <div class="menu-scroll-area" id="menu-items-container">
                    <p style="color: var(--text-muted); font-style: italic;">Syncing menu...</p>
                </div>
            </div>

            <!-- RIGHT: Voice Ordering Panel -->
            <div class="voice-panel">
                <div class="active-table-badge">
                    TABLE <span id="selected-table-id">1</span>
                </div>

                <div class="visualizer" id="visualizer">
                    <div class="bar"></div>
                    <div class="bar" style="animation-delay: 0.1s"></div>
                    <div class="bar" style="animation-delay: 0.2s"></div>
                    <div class="bar" style="animation-delay: 0.3s"></div>
                    <div class="bar" style="animation-delay: 0.1s"></div>
                    <div class="bar" style="animation-delay: 0.4s"></div>
                    <div class="bar" style="animation-delay: 0.2s"></div>
                </div>

                <div class="mic-container" id="mic-container">
                    <button class="mic-btn" id="mic-btn">
                        <i data-lucide="mic" style="width:50px; height:50px; color:#fff;"></i>
                    </button>
                </div>

                <div class="assistant-card">
                    <p id="assistant-reply">"Jai Shri Krishna! Ready for your order."</p>
                    <p id="transcript" style="margin-top:1rem; opacity:0.6; font-size:0.9rem;">Tap to start...</p>
                </div>

                <div class="action-footer">
                    <button class="btn btn-sec" onclick="goBack()">
                        <i data-lucide="chevron-left" style="width:20px;"></i> Exit
                    </button>
                    <button class="btn btn-pri" onclick="finishOrder()">
                        Complete Order
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin === 'null' || window.location.origin === 'file://'
            ? "http://127.0.0.1:8000"
            : window.location.origin;

        let currentTableId = null;
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];

        const CATEGORY_EMOJIS = {
            'Main Course': '🍛',
            'South Indian': '🥘',
            'Starters': '🍢',
            'Snacks': '🍟',
            'Dessert': '🍮',
            'Breads': '🫓',
            'Beverages': '☕',
            'Fast Food': '🍔'
        };

        function selectTable(id) {
            currentTableId = id;
            document.getElementById('selected-table-id').innerText = id;
            document.getElementById('table-screen').style.display = 'none';
            document.getElementById('selection-container').style.display = 'none';
            document.getElementById('order-screen').style.display = 'block';
            loadMenu();
            lucide.createIcons();
        }

        async function loadMenu() {
            try {
                const res = await fetch(`${API_URL}/menu/details`);
                const menuData = await res.json();
                renderMenu(menuData);
            } catch (err) {
                console.error('Failed to load menu:', err);
                document.getElementById('menu-items-container').innerHTML =
                    '<p style="color:#e74c3c;">Could not load menu.</p>';
            }
        }

        function renderMenu(menuData) {
            const container = document.getElementById('menu-items-container');
            // Group by category
            const categories = {};
            for (const [dish, info] of Object.entries(menuData)) {
                const cat = info.category || 'Other';
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push({ name: dish, price: info.price });
            }

            let html = '';
            for (const [cat, items] of Object.entries(categories)) {
                const emoji = CATEGORY_EMOJIS[cat] || '🍽️';
                html += `<div class="menu-category">`;
                html += `<div class="category-header">${emoji} ${cat}</div>`;
                html += `<div class="menu-grid">`;
                items.forEach((item) => {
                    html += `
                        <div class="menu-item-card">
                            <div class="menu-item-name">${item.name}</div>
                            <div class="menu-item-price">₹${item.price}</div>
                        </div>`;
                });
                html += `</div></div>`;
            }
            container.innerHTML = html;
        }

        function goBack() {
            document.getElementById('order-screen').style.display = 'none';
            document.getElementById('selection-container').style.display = '';
            document.getElementById('table-screen').style.display = 'flex';
        }

        const micBtn = document.getElementById('mic-btn');
        const micContainer = document.getElementById('mic-container');
        const transcriptText = document.getElementById('transcript');
        const assistantReply = document.getElementById('assistant-reply');

        micBtn.onclick = async () => {
            if (!isRecording) startRecording();
            else stopRecording();
        };

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    sendAudio(audioBlob);
                };
                mediaRecorder.start();
                isRecording = true;
                document.getElementById('order-screen').classList.add('recording');
                transcriptText.innerText = "Syncing with voice...";
                assistantReply.innerText = "I'm Listening...";
            } catch (err) {
                alert("Microphone access denied.");
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            document.getElementById('order-screen').classList.remove('recording');
            transcriptText.innerText = "Analyzing...";
        }

        async function sendAudio(blob) {
            try {
                const transcribeData = new FormData();
                transcribeData.append('audio', blob, 'recording.wav');

                const tResponse = await fetch(`${API_URL}/order/transcribe`, { method: 'POST', body: transcribeData });
                const tResult = await tResponse.json();

                if (tResult.transcript) {
                    transcriptText.innerText = `"${tResult.transcript}"`;

                    const classifyData = new FormData();
                    classifyData.append('transcript', tResult.transcript);
                    classifyData.append('table_id', currentTableId);

                    const cResponse = await fetch(`${API_URL}/order/classify`, { method: 'POST', body: classifyData });
                    const cResult = await cResponse.json();

                    assistantReply.innerText = cResult.response_text || "Order updated!";
                    if (cResult.speech) { new Audio(`data:audio/wav;base64,${cResult.speech}`).play(); }
                } else {
                    transcriptText.innerText = "No speech detected.";
                    assistantReply.innerText = "Sorry, I didn't catch that. Could you repeat?";
                }
            } catch (err) {
                console.error(err);
                transcriptText.innerText = "Error processing.";
            }
        }

        async function finishOrder() {
            if (!confirm(`Finalize your order for Table ${currentTableId}?`)) return;
            const res = await fetch(`${API_URL}/order/submit?table_id=${currentTableId}`, { method: 'POST' });
            const data = await res.json();
            alert(data.message);
            location.reload();
        }

        lucide.createIcons();
    </script>
</body>

</html>
