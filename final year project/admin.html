<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display - Admin</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --bg-deep: #020617;
            --card-bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --card-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.5);
            --accent-glow: rgba(99, 102, 241, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-deep);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2.5rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .admin-badge {
            background: var(--glass);
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 800;
            color: var(--primary);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 15px #10b981;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.95);
                opacity: 1;
            }

            70% {
                transform: scale(1.5);
                opacity: 0;
            }

            100% {
                transform: scale(0.95);
                opacity: 0;
            }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 5rem;
        }

        .stat-card {
            padding: 2.5rem;
            border-radius: 32px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: 0.4s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .stat-value {
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }

        .order-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 3rem;
        }

        .order-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            transition: all 0.4s;
        }

        .order-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
        }

        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-badge {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
        }

        .status-pill {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 1px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .item-row {
            background: rgba(255, 255, 255, 0.02);
            padding: 1.5rem;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid var(--glass-border);
        }

        .qty-box {
            background: var(--primary-gradient);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
        }

        .item-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
        }

        .item-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .serve-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 1.25rem;
            border-radius: 24px;
            width: 100%;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .serve-btn:hover {
            background: var(--primary);
            color: #fff;
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <header>
            <div class="header-left">
                <h1 class="logo-text">Pooja <span
                        style="font-size: 1.2rem; color: #64748b; font-weight: 600; font-family: 'Inter'; letter-spacing: 0;">Kitchen</span>
                </h1>
                <div id="clock"
                    style="font-weight: 700; color: #475569; font-size: 1rem; margin-top: 5px; opacity: 0.8;"></div>
            </div>

            <div class="admin-badge">
                <div class="pulse-dot"></div>
                LIVE MONITOR
            </div>

            <div class="header-actions">
                <button onclick="location.reload()"
                    style="padding: 0.75rem 1.5rem; border-radius: 100px; border: 1px solid var(--glass-border); background: var(--glass); color: #fff; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; font-size: 0.9rem;">
                    <i data-lucide="refresh-cw" style="width: 18px;"></i> Sync
                </button>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Active Tables</span>
                <span class="stat-value" id="active-tables-val">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Order Volume</span>
                <span class="stat-value" id="active-orders-val">0</span>
            </div>
            <div class="stat-card" style="background: var(--primary-gradient);">
                <span class="stat-label" style="color:rgba(255,255,255,0.7);">Daily Revenue</span>
                <span class="stat-value" id="revenue-val" style="color:#fff;">₹0</span>
            </div>
        </section>

        <main class="order-grid" id="order-container">
            <!-- Table cards populated by JS -->
        </main>
    </div>

    <script>
        const API_URL = window.location.origin === 'null' || window.location.origin === 'file://'
            ? "http://127.0.0.1:8000"
            : window.location.origin;

        let menuData = {};

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchMenuDetails() {
            try {
                const response = await fetch(`${API_URL}/menu/details`);
                if (!response.ok) throw new Error("Offline");
                menuData = await response.json();
            } catch (err) { console.error("Menu fetch failed"); }
        }

        async function fetchStats() {
            try {
                const response = await fetch(`${API_URL}/dashboard/stats`);
                if (!response.ok) throw new Error("Offline");
                const stats = await response.json();
                document.getElementById('active-tables-val').innerText = stats.total_tables_active || 0;
                document.getElementById('active-orders-val').innerText = stats.active_orders;
                document.getElementById('revenue-val').innerText = `₹${stats.revenue}`;
            } catch (err) { }
        }

        async function fetchOrders() {
            try {
                const response = await fetch(`${API_URL}/order/all_states`);
                if (!response.ok) throw new Error("Offline");
                const allStates = await response.json();
                renderAllOrders(allStates);
            } catch (err) { }
        }

        function renderAllOrders(allStates) {
            const container = document.getElementById('order-container');
            container.innerHTML = '';

            let hasAnyOrder = false;
            for (const [tableId, state] of Object.entries(allStates)) {
                if (state.confirmed && Object.keys(state.confirmed).length > 0) {
                    hasAnyOrder = true;
                    renderTableCard(tableId, state.confirmed, container);
                }
            }

            if (!hasAnyOrder) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:6rem; color:#94a3b8; font-weight:700; font-size:1.4rem;">
                    <i data-lucide="inbox" style="width:60px; height:60px; margin-bottom:1rem; opacity:0.3;"></i><br>
                    No active orders at the moment.
                </div>`;
            }
            lucide.createIcons();
        }

        function renderTableCard(tableId, confirmed, container) {
            const card = document.createElement('div');
            card.className = 'order-card';

            let itemsHtml = '';
            for (const [item, details] of Object.entries(confirmed)) {
                const qty = details.quantity || 1;
                const addons = Array.isArray(details.addons) ? details.addons.join(', ') : (details.addons ? Object.keys(details.addons).join(', ') : 'Standard');

                itemsHtml += `
                    <div class="item-row">
                        <div class="qty-box">${qty}</div>
                        <div>
                            <div class="item-name">${item}</div>
                            <div class="item-meta">${addons}</div>
                        </div>
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="order-card-header">
                    <div class="table-badge">Table ${tableId}</div>
                    <div class="status-pill">PREPARING</div>
                </div>
                <div style="flex:1;">${itemsHtml}</div>
                <button class="serve-btn" onclick="clearTable('${tableId}')">MARK AS SERVED</button>
            `;
            container.appendChild(card);
        }

        async function clearTable(id) {
            if (!confirm(`Mark Table ${id} as served? This will clear the table display.`)) return;
            await fetch(`${API_URL}/order/reset?table_id=${id}`, { method: 'POST' });
            fetchStats();
            fetchOrders();
        }

        // Live updates
        setInterval(() => { fetchStats(); fetchOrders(); }, 3000);

        window.onload = () => {
            fetchMenuDetails().then(() => {
                fetchStats();
                fetchOrders();
            });
        };
    </script>
</body>

</html>
