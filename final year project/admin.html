<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display System — Pooja Restaurant</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ═══════════ DESIGN SYSTEM ═══════════ */
        :root {
            --bg: #0a0e14;
            --surface: #111820;
            --surface-elevated: #151e2c;
            --border: #1e2a3a;
            --border-strong: #2a3a4a;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-muted: rgba(99, 102, 241, 0.12);
            --text: #f1f5f9;
            --text-dim: #6b7c93;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.4);
            --transition: 200ms cubic-bezier(0.2, 0.8, 0.2, 1);
            --status-new: #f59e0b;
            --status-prep: #6366f1;
            --status-ready: #10b981;
            --status-urgent: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 6px;
        }

        .font-outfit {
            font-family: 'Outfit', sans-serif;
        }

        /* ═══════════ UTILITIES (for JS dynamic class manipulation) ═══════════ */
        .flex {
            display: flex;
        }
        .items-center {
            align-items: center;
        }
        .gap-1 {
            gap: 4px;
        }
        .gap-2 {
            gap: 8px;
        }
        .font-bold {
            font-weight: 700;
        }
        .text-sm {
            font-size: 14px;
        }
        .text-rose-400 {
            color: var(--status-urgent);
        }
        .text-amber-400 {
            color: var(--status-new);
        }
        .text-emerald-400 {
            color: var(--status-ready);
        }
        .transition-all {
            transition: var(--transition);
        }
        .translate-y-24 {
            transform: translateY(96px);
        }
        .translate-y-0 {
            transform: translateY(0);
        }
        .opacity-0 {
            opacity: 0;
        }
        .opacity-100 {
            opacity: 1;
        }
        .timer-alert {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.3;
            }
        }
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: none;
            }
        }
        @keyframes pulseDot {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
            }
        }

        /* ═══════════ HEADER ═══════════ */

        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: 1600px;
            margin: 0 auto;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .brand-icon i {
            width: 18px;
            color: #fff;
        }

        .brand-text {
            line-height: 1.2;
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 20px;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .brand-sub {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .header-center {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.25);
            color: var(--status-ready);
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--status-ready);
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5);
            animation: pulseDot 2s infinite;
        }

        .header-clock {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: var(--text);
            font-variant-numeric: tabular-nums;
            min-width: 90px;
            text-align: right;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .header-btn:hover {
            background: var(--surface-elevated);
            color: var(--text);
            border-color: var(--accent);
        }

        .header-btn i {
            width: 18px;
            height: 18px;
        }

        /* ═══════════ STATS BAR ═══════════ */

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-bottom: 1px solid var(--border);
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            background: var(--surface);
            border-right: 1px solid var(--border);
        }

        .stat-card:last-child {
            border-right: none;
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-icon i {
            width: 20px;
            height: 20px;
        }

        .stat-icon-indigo {
            background: var(--accent-muted);
            color: #a5b4fc;
        }
        .stat-icon-amber {
            background: rgba(245, 158, 11, 0.12);
            color: #fcd34d;
        }
        .stat-icon-green {
            background: rgba(16, 185, 129, 0.12);
            color: #6ee7b7;
        }
        .stat-icon-rose {
            background: rgba(239, 68, 68, 0.12);
            color: #fca5a5;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .stat-value {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 28px;
            color: var(--text);
            line-height: 1.1;
            margin-top: 4px;
        }

        /* ═══════════ FILTER BAR ═══════════ */

        .filter-bar {
            max-width: 1600px;
            margin: 0 auto;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-tab {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            min-height: 40px;
        }

        .filter-tab:hover {
            color: var(--text);
            border-color: var(--border-strong);
        }

        .filter-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .filter-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            height: 22px;
            border-radius: var(--radius-sm);
            font-size: 10px;
            font-weight: 700;
            padding: 0 6px;
        }

        .filter-tab .filter-count {
            background: rgba(255, 255, 255, 0.1);
        }
        .filter-tab.active .filter-count {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ═══════════ KDS GRID ═══════════ */

        #kds-grid {
            display: grid;
            gap: 16px;
            padding: 16px 24px 32px;
            max-width: 1600px;
            margin: 0 auto;
            grid-template-columns: 1fr;
        }

        @media (min-width: 640px) {
            #kds-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (min-width: 1024px) {
            #kds-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (min-width: 1440px) {
            #kds-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* ═══════════ ORDER CARD ═══════════ */

        .order-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: slideIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition: box-shadow var(--transition), border-color var(--transition);
            min-height: 320px;
        }

        .order-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--border-strong);
        }

        /* Card status top border */
        .card-new {
            border-top: 3px solid var(--status-new);
        }
        .card-prep {
            border-top: 3px solid var(--status-prep);
        }
        .card-ready {
            border-top: 3px solid var(--status-ready);
        }
        .card-urgent {
            border-top: 3px solid var(--status-urgent) !important;
            box-shadow: 0 0 0 1px var(--status-urgent), var(--shadow-md) !important;
        }

        /* ── Card Header ── */

        .card-hd {
            padding: 16px 20px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .card-hd-left {}

        .card-table-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--text);
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .card-hd-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        /* Status badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .status-badge-new {
            background: rgba(245, 158, 11, 0.12);
            color: var(--status-new);
            border: 1px solid rgba(245, 158, 11, 0.25);
        }

        .status-badge-prep {
            background: var(--accent-muted);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.25);
        }

        .status-badge-ready {
            background: rgba(16, 185, 129, 0.12);
            color: var(--status-ready);
            border: 1px solid rgba(16, 185, 129, 0.25);
        }

        .status-badge-urgent {
            background: rgba(239, 68, 68, 0.12);
            color: var(--status-urgent);
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        /* Timer */
        .card-timer {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        /* ── Card Items ── */

        .card-items {
            padding: 12px 16px 8px;
            flex: 1;
            overflow-y: auto;
        }

        .item-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid transparent;
            transition: var(--transition);
            margin-bottom: 8px;
        }

        .item-row:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border);
        }

        .item-row.item-checked {
            opacity: 0.4;
        }

        .item-row.item-checked .item-name {
            text-decoration: line-through;
        }

        .item-checkbox {
            margin-top: 2px;
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--border-strong);
            background: transparent;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .item-checkbox:hover {
            border-color: var(--accent);
        }

        .item-checkbox.item-checkbox-done {
            background: var(--status-ready);
            border-color: var(--status-ready);
        }

        .item-checkbox-done svg {
            width: 12px;
            color: #fff;
        }

        .item-qty {
            width: 30px;
            height: 30px;
            border-radius: var(--radius-sm);
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 800;
            flex-shrink: 0;
            font-family: 'Outfit', sans-serif;
        }

        .item-details {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }

        .item-name.item-name-done {
            text-decoration: line-through;
        }

        .item-addons {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 6px;
        }

        .item-addon {
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-dim);
        }

        .item-addon.item-addon-muted {
            color: var(--text-dim);
            opacity: 0.6;
        }

        /* ── Pending Item ── */

        .pending-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius-md);
            background: rgba(245, 158, 11, 0.06);
            border: 1px dashed rgba(245, 158, 11, 0.3);
            margin-bottom: 8px;
            animation: pulsePending 2s ease-in-out infinite;
        }

        @keyframes pulsePending {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        .pending-item-qty {
            width: 30px;
            height: 30px;
            border-radius: var(--radius-sm);
            background: rgba(245, 158, 11, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--status-new);
            font-size: 12px;
            font-weight: 800;
            flex-shrink: 0;
            font-family: 'Outfit', sans-serif;
        }

        .pending-item-body {
            flex: 1;
            min-width: 0;
        }

        .pending-item-name {
            font-weight: 600;
            font-size: 14px;
            color: rgba(253, 230, 138, 0.7);
            font-style: italic;
        }

        .pending-item-label {
            font-size: 10px;
            font-weight: 700;
            color: rgba(245, 158, 11, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .pending-item-icon {
            width: 16px;
            height: 16px;
            color: rgba(245, 158, 11, 0.5);
            margin-top: 4px;
            flex-shrink: 0;
        }

        /* ── Card Footer ── */

        .card-ft {
            padding: 12px 16px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }

        .card-ft .btn {
            flex: 1;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            min-height: 44px;
            font-family: 'Inter', sans-serif;
            text-decoration: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn i {
            width: 16px;
            height: 16px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: var(--shadow-sm);
        }

        .btn-success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--status-ready);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover {
            background: var(--status-ready);
            color: #fff;
            border-color: var(--status-ready);
        }

        .btn-ghost {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--surface-elevated);
            color: var(--text);
        }

        /* ═══════════ EMPTY STATE ═══════════ */

        .empty-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            gap: 16px;
            text-align: center;
        }

        .empty-state-icon {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-lg);
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state-icon i {
            width: 36px;
            height: 36px;
            color: var(--text-dim);
        }

        .empty-state h3 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--text);
        }

        .empty-state p {
            font-size: 14px;
            color: var(--text-dim);
            max-width: 260px;
        }

        /* ═══════════ TOAST ═══════════ */

        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 4px solid var(--status-ready);
            border-radius: var(--radius-lg);
            padding: 14px 20px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            box-shadow: var(--shadow-lg);
            transition: transform 400ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 400ms ease;
        }

        #toast i {
            width: 18px;
            height: 18px;
            color: var(--status-ready);
        }

        /* ═══════════ RESPONSIVE ═══════════ */

        @media (max-width: 767px) {
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-card {
                padding: 12px 16px;
            }

            .stat-value {
                font-size: 22px;
            }

            .stat-icon {
                width: 36px;
                height: 36px;
            }
            .stat-icon i {
                width: 16px;
                height: 16px;
            }

            .header-inner {
                padding: 0 16px;
                gap: 12px;
            }

            .brand-sub {
                display: none;
            }

            .header-clock {
                font-size: 12px;
                min-width: auto;
            }

            .filter-bar {
                padding: 10px 16px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .filter-tab {
                flex-shrink: 0;
                font-size: 11px;
                padding: 6px 14px;
                min-height: 36px;
            }

            #kds-grid {
                padding: 12px 16px 24px;
                gap: 12px;
            }

            .live-badge {
                font-size: 10px;
                padding: 4px 10px;
            }

            .brand-name {
                font-size: 17px;
            }

            #toast {
                left: 16px;
                right: 16px;
                bottom: 16px;
                font-size: 13px;
            }
        }

        @media (max-width: 479px) {
            .stats-bar {
                grid-template-columns: 1fr;
            }

            .stat-card {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .stat-card:last-child {
                border-bottom: none;
            }

            .header-center {
                gap: 12px;
            }

            .card-hd {
                padding: 14px 16px 10px;
                flex-direction: column;
                gap: 8px;
            }

            .card-hd-right {
                width: 100%;
                justify-content: space-between;
            }

            .card-items {
                padding: 10px 12px 4px;
            }

            .item-row {
                padding: 8px 10px;
                gap: 10px;
            }

            .card-ft {
                padding: 10px 12px 14px;
                flex-direction: column;
            }

            .card-ft .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- ═══════════ TOP BAR ═══════════ -->
    <header>
        <div class="header-inner">

            <!-- Brand -->
            <div class="header-left">
                <div class="brand-icon">
                    <i data-lucide="utensils"></i>
                </div>
                <div class="brand-text">
                    <div class="brand-name">Pooja Kitchen</div>
                    <div class="brand-sub">Display System</div>
                </div>
            </div>

            <!-- Center -->
            <div class="header-center">
                <div class="live-badge">
                    <span class="pulse-dot"></span>
                    LIVE
                </div>
                <div id="clock-display" class="header-clock"></div>
            </div>

            <!-- Actions -->
            <div class="header-right">
                <button onclick="toggleSound()" id="sound-btn" class="header-btn">
                    <i data-lucide="volume-2" id="sound-icon"></i>
                </button>
                <button onclick="forceRefresh()" class="header-btn">
                    <i data-lucide="refresh-cw" id="refresh-icon"></i>
                </button>
            </div>

        </div>
    </header>

    <!-- ═══════════ STATS BAR ═══════════ -->
    <div class="stats-bar">

        <div class="stat-card">
            <div class="stat-icon stat-icon-indigo">
                <i data-lucide="layout-grid"></i>
            </div>
            <div>
                <div class="stat-label">Active Tables</div>
                <div class="stat-value" id="stat-tables">0</div>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon stat-icon-amber">
                <i data-lucide="clock"></i>
            </div>
            <div>
                <div class="stat-label">Pending Items</div>
                <div class="stat-value" id="stat-pending">0</div>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon stat-icon-green">
                <i data-lucide="check-circle-2"></i>
            </div>
            <div>
                <div class="stat-label">Items Today</div>
                <div class="stat-value" id="stat-items">0</div>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon stat-icon-rose">
                <i data-lucide="indian-rupee"></i>
            </div>
            <div>
                <div class="stat-label">Revenue</div>
                <div class="stat-value" id="stat-revenue">₹0</div>
            </div>
        </div>

    </div>

    <!-- ═══════════ FILTER BAR ═══════════ -->
    <div class="filter-bar">
        <button class="filter-tab active" onclick="setFilter('all',this)">All Orders</button>
        <button class="filter-tab" onclick="setFilter('new',this)">🔴 New <span class="filter-count" id="cnt-new">0</span></button>
        <button class="filter-tab" onclick="setFilter('prep',this)">🟡 Preparing <span class="filter-count" id="cnt-prep">0</span></button>
        <button class="filter-tab" onclick="setFilter('ready',this)">🟢 Ready <span class="filter-count" id="cnt-ready">0</span></button>
    </div>

    <!-- ═══════════ KDS GRID ═══════════ -->
    <main id="kds-grid"></main>

    <!-- ═══════════ TOAST ═══════════ -->
    <div id="toast"
        class="translate-y-24 opacity-0">
        <i data-lucide="bell" id="toast-icon"></i>
        <span id="toast-msg">New order received!</span>
    </div>

    <script>
        const API = window.location.origin.startsWith('file') ? 'http://127.0.0.1:8000' : window.location.origin;

        let orderStatuses = {};
        let orderTimestamps = {};
        let checkedItems = {};
        let prevOrderKeys = new Set();
        let currentFilter = 'all';
        let soundEnabled = true;
        let itemsServedTotal = 0;

        // ── CLOCK
        function updateClock() {
            document.getElementById('clock-display').textContent =
                new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit',
                    hour12: true });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ── SOUND
        function playBeep() {
            if (!soundEnabled) return;
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                [0, 0.13, 0.26].forEach(t => {
                    const o = ctx.createOscillator(),
                        g = ctx.createGain();
                    o.connect(g);
                    g.connect(ctx.destination);
                    o.frequency.value = 880;
                    g.gain.setValueAtTime(0, ctx.currentTime + t);
                    g.gain.linearRampToValueAtTime(0.3, ctx.currentTime + t + 0.02);
                    g.gain.linearRampToValueAtTime(0, ctx.currentTime + t + 0.12);
                    o.start(ctx.currentTime + t);
                    o.stop(ctx.currentTime + t + 0.13);
                });
            } catch (e) {}
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const icon = document.getElementById('sound-icon');
            icon.setAttribute('data-lucide', soundEnabled ? 'volume-2' : 'volume-x');
            lucide.createIcons();
        }

        // ── TOAST
        function showToast(msg, borderColor = '#10b981') {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            t.style.borderLeftColor = borderColor;
            t.classList.remove('translate-y-24', 'opacity-0');
            t.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { t.classList.add('translate-y-24', 'opacity-0');
                t.classList.remove('translate-y-0', 'opacity-100'); }, 3500);
        }

        // ── FILTER
        function setFilter(f, el) {
            currentFilter = f;
            document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderGrid(window._lastStates || {});
        }

        // ── TIMER
        function getElapsed(id) {
            const ts = orderTimestamps[id];
            return ts ? Math.floor((Date.now() - ts) / 1000) : 0;
        }

        function fmtTime(s) {
            return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
        }

        // ── FETCH
        async function fetchAll() {
            try {
                const [sr, or] = await Promise.all([
                    fetch(`${API}/dashboard/stats`),
                    fetch(`${API}/order/all_states`)
                ]);
                const stats = await sr.json();
                const states = await or.json();

                document.getElementById('stat-tables').textContent = stats.total_tables_active || 0;
                document.getElementById('stat-pending').textContent = stats.active_orders || 0;
                document.getElementById('stat-revenue').textContent = '₹' + (stats.revenue || 0);

                // Detect active tables: either have confirmed items OR a pending confirmation
                const cur = new Set(Object.keys(states).filter(k => {
                    const hasConfirmed = Object.keys(states[k].confirmed || {}).length > 0;
                    const hasPending = !!states[k].pending_confirmation;
                    return hasConfirmed || hasPending;
                }));

                for (const k of cur) {
                    if (!prevOrderKeys.has(k)) {
                        orderStatuses[k] = orderStatuses[k] || 'new';
                        orderTimestamps[k] = orderTimestamps[k] || Date.now();
                        checkedItems[k] = checkedItems[k] || new Set();
                        playBeep();
                        showToast(`🔔 New activity — Table ${k.replace('table_', '')}`);
                    }
                }
                for (const k of prevOrderKeys) {
                    if (!cur.has(k)) {
                        delete orderStatuses[k];
                        delete orderTimestamps[k];
                        delete checkedItems[k];
                    }
                }
                prevOrderKeys = cur;

                let cntNew = 0,
                    cntPrep = 0,
                    cntReady = 0,
                    totItems = 0;
                for (const k of cur) {
                    const st = orderStatuses[k] || 'new';
                    if (st === 'new') cntNew++;
                    if (st === 'prep') cntPrep++;
                    if (st === 'ready') cntReady++;
                    totItems += Object.keys(states[k].confirmed || {}).length;
                }
                document.getElementById('cnt-new').textContent = cntNew;
                document.getElementById('cnt-prep').textContent = cntPrep;
                document.getElementById('cnt-ready').textContent = cntReady;
                document.getElementById('stat-items').textContent = totItems + itemsServedTotal;

                window._lastStates = states;
                renderGrid(states);
            } catch (e) {}
        }

        // ── RENDER
        function renderGrid(allStates) {
            const grid = document.getElementById('kds-grid');
            // Filter states that have either confirmed items or a pending confirmation
            const active = Object.entries(allStates).filter(([k, s]) => {
                const hasConfirmed = Object.keys(s.confirmed || {}).length > 0;
                const hasPending = !!s.pending_confirmation;
                return hasConfirmed || hasPending;
            });
            const filtered = active.filter(([k]) => {
                if (currentFilter === 'all') return true;
                return (orderStatuses[k] || 'new') === currentFilter;
            });

            if (!filtered.length) {
                grid.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">
                    <i data-lucide="chef-hat"></i>
                </div>
                <h3>All Clear!</h3>
                <p>No active orders right now. Kitchen is ready.</p>
            </div>`;
                lucide.createIcons();
                return;
            }

            // Sort: urgent first, then by age
            filtered.sort(([a], [b]) => {
                const urgA = getElapsed(a) > 600 ? 1 : 0;
                const urgB = getElapsed(b) > 600 ? 1 : 0;
                if (urgA !== urgB) return urgB - urgA;
                return getElapsed(b) - getElapsed(a);
            });

            grid.innerHTML = filtered.map(([tid, state]) => buildCard(tid, state)).join('');
            lucide.createIcons();
        }

        function buildCard(tableId, state) {
            const confirmed = state.confirmed || {};
            const pending = state.pending_confirmation;

            const status = orderStatuses[tableId] || 'new';
            const elapsed = getElapsed(tableId);
            const urgent = elapsed > 600;
            const checked = checkedItems[tableId] || new Set();
            const items = Object.entries(confirmed);
            const tNum = tableId.replace('table_', '');

            const statusBanner = {
                new: `<span class="status-badge status-badge-new">New Order</span>`,
                prep: `<span class="status-badge status-badge-prep">Preparing</span>`,
                ready: `<span class="status-badge status-badge-ready">Ready!</span>`,
            };

            const timerColor = elapsed > 600 ? 'text-rose-400 timer-alert' : elapsed > 300 ? 'text-amber-400' : 'text-emerald-400';
            const timerEmoji = elapsed > 600 ? '⚠️' : '⏱';

            const itemsHtml = items.map(([key, det]) => {
                const qty = det.quantity || 1;
                const addons = Array.isArray(det.addons)
                    ? det.addons.filter(Boolean)
                    : typeof det.addons === 'object' ? Object.entries(det.addons || {}).map(([k, v]) => `${k}: ${v}`) : [];
                const done = checked.has(key);
                const addonHtml = addons.length
                    ? addons.map(a => `<span class="item-addon">${a}</span>`).join('')
                    : `<span class="item-addon item-addon-muted">Standard</span>`;

                return `
        <div class="item-row${done ? ' item-checked' : ''}">
            <button onclick="toggleItem('${tableId}','${key}')"
                class="item-checkbox${done ? ' item-checkbox-done' : ''}">
                ${done ? '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' : ''}
            </button>
            <div class="item-qty">${qty}</div>
            <div class="item-details">
                <div class="item-name${done ? ' item-name-done' : ''}">${key}</div>
                <div class="item-addons">${addonHtml}</div>
            </div>
        </div>`;
            }).join('');

            // Add Pending Item if exists
            let pendingHtml = '';
            if (pending) {
                const pQty = pending.quantity || 1;
                const pName = pending.suggested || pending.original;
                pendingHtml = `
               <div class="pending-item">
                   <div class="pending-item-qty">${pQty}</div>
                   <div class="pending-item-body">
                       <div class="pending-item-name">${pName}</div>
                       <div class="pending-item-label">Waiting for user confirmation...</div>
                   </div>
                   <i data-lucide="help-circle" class="pending-item-icon"></i>
               </div>`;
            }

            const footerBtns = status === 'ready'
                ? `<button onclick="markServed('${tableId}')"
              class="btn btn-success">
              <i data-lucide="check" class="btn-icon"></i> Mark Served
           </button>`
                : status === 'prep'
                    ? `<button onclick="setStatus('${tableId}','ready')"
              class="btn btn-primary">
              <i data-lucide="bell-ring" class="btn-icon"></i> Ready to Serve
           </button>
           <button onclick="markServed('${tableId}')"
              class="btn btn-ghost">Skip</button>`
                    : `<button onclick="setStatus('${tableId}','prep')"
              class="btn btn-primary">
              <i data-lucide="flame" class="btn-icon"></i> Start Preparing
           </button>
           <button onclick="markServed('${tableId}')"
              class="btn btn-ghost">Dismiss</button>`;

            const cardBorder = urgent ? 'card-urgent' : `card-${status}`;

            return `
    <div class="order-card ${cardBorder}" id="card-${tableId}">
        <!-- Header -->
        <div class="card-hd">
            <div class="card-hd-left">
                <div class="card-table-name">Table ${tNum}</div>
                <div class="card-meta">${items.length} item${items.length > 1 ? 's' : ''} · ${checked.size}/${items.length} done</div>
            </div>
            <div class="card-hd-right">
                ${urgent ? `<span class="status-badge status-badge-urgent">URGENT</span>` : statusBanner[status]}
                <div class="flex items-center gap-1 font-outfit font-bold text-sm ${timerColor}">
                    <span>${timerEmoji}</span>
                    <span class="timer-val" data-table="${tableId}">${fmtTime(elapsed)}</span>
                </div>
            </div>
        </div>

        <!-- Items -->
        <div class="card-items">
            ${itemsHtml}
            ${pendingHtml}
        </div>

        <!-- Footer -->
        <div class="card-ft">${footerBtns}</div>
    </div>`;
        }

        // ── ACTIONS
        function toggleItem(tableId, itemKey) {
            if (!checkedItems[tableId]) checkedItems[tableId] = new Set();
            const s = checkedItems[tableId];
            s.has(itemKey) ? s.delete(itemKey) : s.add(itemKey);
            renderGrid(window._lastStates || {});
        }

        function setStatus(tableId, status) {
            orderStatuses[tableId] = status;
            if (status === 'ready') {
                playBeep();
                showToast(`✅ Table ${tableId.replace('table_', '')} — Order Ready!`, '#10b981');
            }
            renderGrid(window._lastStates || {});
        }

        async function markServed(tableId) {
            const confirmed = ((window._lastStates || {})[tableId] || {}).confirmed || {};
            itemsServedTotal += Object.keys(confirmed).length;
            showToast(`🍽️ Table ${tableId.replace('table_', '')} served!`, '#6366f1');
            await fetch(`${API}/order/reset?table_id=${tableId}`, { method: 'POST' });
            delete orderStatuses[tableId];
            delete orderTimestamps[tableId];
            delete checkedItems[tableId];
            fetchAll();
        }

        function forceRefresh() {
            document.getElementById('refresh-icon').style.animation = 'spin 0.6s linear';
            setTimeout(() => document.getElementById('refresh-icon').style.animation = '', 700);
            fetchAll();
        }

        // ── LIVE TIMERS (every second, no re-render)
        setInterval(() => {
            document.querySelectorAll('.timer-val[data-table]').forEach(el => {
                const tid = el.getAttribute('data-table');
                const e = getElapsed(tid);
                el.textContent = fmtTime(e);
                const color = e > 600 ? 'text-rose-400 timer-alert' : e > 300 ? 'text-amber-400' : 'text-emerald-400';
                const timer = el.closest('div.flex');
                if (timer) timer.className = `flex items-center gap-1 font-outfit font-bold text-sm ${color}`;
                if (e > 600) document.getElementById(`card-${tid}`)?.classList.add('card-urgent');
            });
        }, 1000);

        // ── EVENT STREAM (SSE)
        const eventSource = new EventSource(`${API}/dashboard/stream`);
        eventSource.onmessage = function(event) {
            if (event.data === 'update') {
                fetchAll();
            } else if (event.data === 'connected') {
                console.log("SSE Connected");
            }
        };
        eventSource.onerror = function(err) {
            console.error("SSE Error", err);
        };

        window.onload = fetchAll;
    </script>

</body>

</html>
