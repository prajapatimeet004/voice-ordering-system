<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display System — Pooja Restaurant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff',
                            500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                        },
                        surface: {
                            900: '#060b14',
                            800: '#0d1626',
                            700: '#111d30',
                            600: '#162035',
                        }
                    },
                    animation: {
                        'pulse-dot': 'pulseDot 2s infinite',
                        'slide-in': 'slideIn 0.35s cubic-bezier(0.34,1.56,0.64,1)',
                        'blink': 'blink 1s step-end infinite',
                        'spin-once': 'spin 0.6s linear',
                    },
                    keyframes: {
                        pulseDot: {
                            '0%,100%': { boxShadow: '0 0 0 0 rgba(16,185,129,0.5)' },
                            '70%': { boxShadow: '0 0 0 10px rgba(16,185,129,0)' },
                        },
                        slideIn: {
                            from: { opacity: 0, transform: 'translateY(16px) scale(0.97)' },
                            to: { opacity: 1, transform: 'none' },
                        },
                        blink: { '50%': { opacity: 0.3 } },
                    },
                    backdropBlur: { xl: '20px' },
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .font-outfit {
            font-family: 'Outfit', sans-serif;
        }

        /* Gradient text */
        .text-gradient {
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-gradient-brand {
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Card status top border */
        .card-new {
            border-top: 3px solid #f59e0b;
        }

        .card-prep {
            border-top: 3px solid #6366f1;
        }

        .card-ready {
            border-top: 3px solid #10b981;
        }

        .card-urgent {
            border-color: #ef4444 !important;
            box-shadow: 0 0 0 1px #ef4444, 0 20px 60px rgba(239, 68, 68, 0.15) !important;
        }

        /* Checked item */
        .item-checked {
            opacity: 0.4;
        }

        .item-checked .item-name {
            text-decoration: line-through;
        }

        /* glow effects */
        .glow-brand {
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.25);
        }

        .glow-green {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.25);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #060b14;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e2d45;
            border-radius: 6px;
        }

        /* Animate in */
        .order-card {
            animation: slideIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* Timer blink */
        .timer-alert {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.3;
            }
        }

        /* Pulse dot */
        .pulse-dot {
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5);
            animation: pulseDot 2s infinite;
        }

        @keyframes pulseDot {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
            }
        }
    </style>
</head>

<body class="bg-[#060b14] text-slate-100 min-h-screen antialiased">

    <!-- ═══════════════════════ TOP BAR ═══════════════════════ -->
    <header class="sticky top-0 z-50 border-b border-white/[0.07] bg-[#060b14]/80 backdrop-blur-xl">
        <div class="mx-auto max-w-screen-2xl px-6 h-16 flex items-center justify-between gap-4">

            <!-- Brand -->
            <div class="flex items-center gap-3">
                <div
                    class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center glow-brand flex-shrink-0">
                    <i data-lucide="utensils" class="w-4 text-white"></i>
                </div>
                <div class="leading-tight">
                    <div class="font-outfit font-black text-xl text-gradient tracking-tight">Pooja Kitchen</div>
                    <div class="text-[10px] text-slate-500 uppercase tracking-[2px] font-bold">Display System</div>
                </div>
            </div>

            <!-- Center -->
            <div class="flex items-center gap-4">
                <div
                    class="flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/25 text-emerald-400 px-3 py-1.5 rounded-full text-xs font-bold tracking-wider">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 pulse-dot"></div>
                    LIVE
                </div>
                <div id="clock-display"
                    class="font-outfit font-bold text-slate-200 text-sm tabular-nums min-w-[90px] text-right"></div>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-2">
                <button onclick="toggleSound()" id="sound-btn"
                    class="w-9 h-9 rounded-xl border border-white/10 bg-surface-800 text-slate-400 hover:text-white hover:border-indigo-500 flex items-center justify-center transition-all">
                    <i data-lucide="volume-2" class="w-4" id="sound-icon"></i>
                </button>
                <button onclick="forceRefresh()"
                    class="w-9 h-9 rounded-xl border border-white/10 bg-surface-800 text-slate-400 hover:text-white hover:border-indigo-500 flex items-center justify-center transition-all">
                    <i data-lucide="refresh-cw" class="w-4" id="refresh-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- ═══════════════════════ STATS BAR ═══════════════════════ -->
    <div class="grid grid-cols-4 border-b border-white/[0.07] divide-x divide-white/[0.07]">

        <div class="bg-[#0d1626] px-6 py-4 flex items-center gap-4 hover:bg-[#111d30] transition-colors group">
            <div
                class="w-11 h-11 rounded-2xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 group-hover:bg-indigo-500/20 transition-colors">
                <i data-lucide="layout-grid" class="w-5"></i>
            </div>
            <div>
                <div class="text-[10px] text-slate-500 uppercase tracking-[1.5px] font-bold">Active Tables</div>
                <div class="font-outfit font-black text-3xl text-white leading-none mt-0.5" id="stat-tables">0</div>
            </div>
        </div>

        <div class="bg-[#0d1626] px-6 py-4 flex items-center gap-4 hover:bg-[#111d30] transition-colors group">
            <div
                class="w-11 h-11 rounded-2xl bg-amber-500/10 flex items-center justify-center text-amber-400 group-hover:bg-amber-500/20 transition-colors">
                <i data-lucide="clock" class="w-5"></i>
            </div>
            <div>
                <div class="text-[10px] text-slate-500 uppercase tracking-[1.5px] font-bold">Pending Items</div>
                <div class="font-outfit font-black text-3xl text-white leading-none mt-0.5" id="stat-pending">0</div>
            </div>
        </div>

        <div class="bg-[#0d1626] px-6 py-4 flex items-center gap-4 hover:bg-[#111d30] transition-colors group">
            <div
                class="w-11 h-11 rounded-2xl bg-emerald-500/10 flex items-center justify-center text-emerald-400 group-hover:bg-emerald-500/20 transition-colors">
                <i data-lucide="check-circle-2" class="w-5"></i>
            </div>
            <div>
                <div class="text-[10px] text-slate-500 uppercase tracking-[1.5px] font-bold">Items Today</div>
                <div class="font-outfit font-black text-3xl text-white leading-none mt-0.5" id="stat-items">0</div>
            </div>
        </div>

        <div class="bg-[#0d1626] px-6 py-4 flex items-center gap-4 hover:bg-[#111d30] transition-colors group">
            <div
                class="w-11 h-11 rounded-2xl bg-rose-500/10 flex items-center justify-center text-rose-400 group-hover:bg-rose-500/20 transition-colors">
                <i data-lucide="indian-rupee" class="w-5"></i>
            </div>
            <div>
                <div class="text-[10px] text-slate-500 uppercase tracking-[1.5px] font-bold">Revenue</div>
                <div class="font-outfit font-black text-3xl text-white leading-none mt-0.5" id="stat-revenue">₹0</div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════ FILTER BAR ═══════════════════════ -->
    <div class="mx-auto max-w-screen-2xl px-6 py-3 flex items-center gap-2">
        <button
            class="filter-tab active px-4 py-1.5 rounded-full border border-white/10 bg-transparent text-slate-400 text-xs font-bold tracking-wide cursor-pointer transition-all hover:text-white"
            onclick="setFilter('all',this)">All Orders</button>
        <button
            class="filter-tab px-4 py-1.5 rounded-full border border-white/10 bg-transparent text-slate-400 text-xs font-bold tracking-wide cursor-pointer transition-all hover:text-white"
            onclick="setFilter('new',this)">🔴 New <span id="cnt-new"
                class="ml-1 inline-flex items-center justify-center bg-white/10 w-5 h-5 rounded-full text-[10px]">0</span></button>
        <button
            class="filter-tab px-4 py-1.5 rounded-full border border-white/10 bg-transparent text-slate-400 text-xs font-bold tracking-wide cursor-pointer transition-all hover:text-white"
            onclick="setFilter('prep',this)">🟡 Preparing <span id="cnt-prep"
                class="ml-1 inline-flex items-center justify-center bg-white/10 w-5 h-5 rounded-full text-[10px]">0</span></button>
        <button
            class="filter-tab px-4 py-1.5 rounded-full border border-white/10 bg-transparent text-slate-400 text-xs font-bold tracking-wide cursor-pointer transition-all hover:text-white"
            onclick="setFilter('ready',this)">🟢 Ready <span id="cnt-ready"
                class="ml-1 inline-flex items-center justify-center bg-white/10 w-5 h-5 rounded-full text-[10px]">0</span></button>
    </div>

    <style>
        .filter-tab.active {
            background: #6366f1;
            border-color: #6366f1;
            color: #fff;
        }
    </style>

    <!-- ═══════════════════════ KDS GRID ═══════════════════════ -->
    <main id="kds-grid"
        class="mx-auto max-w-screen-2xl px-6 pb-10 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-5">
    </main>

    <!-- ═══════════════════════ TOAST ═══════════════════════ -->
    <div id="toast"
        class="fixed bottom-6 right-6 z-50 flex items-center gap-3 bg-[#111d30] border border-white/10 border-l-4 rounded-2xl px-5 py-3.5 font-bold text-sm shadow-2xl translate-y-24 opacity-0 transition-all duration-500">
        <i data-lucide="bell" class="w-4 text-emerald-400" id="toast-icon"></i>
        <span id="toast-msg">New order received!</span>
    </div>

    <script>
        const API = window.location.origin.startsWith('file') ? 'http://127.0.0.1:8000' : window.location.origin;

        let orderStatuses = {};
        let orderTimestamps = {};
        let checkedItems = {};
        let prevOrderKeys = new Set();
        let currentFilter = 'all';
        let soundEnabled = true;
        let itemsServedTotal = 0;

        // ── CLOCK
        function updateClock() {
            document.getElementById('clock-display').textContent =
                new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        }
        setInterval(updateClock, 1000); updateClock();

        // ── SOUND
        function playBeep() {
            if (!soundEnabled) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [0, 0.13, 0.26].forEach(t => {
                    const o = ctx.createOscillator(), g = ctx.createGain();
                    o.connect(g); g.connect(ctx.destination);
                    o.frequency.value = 880;
                    g.gain.setValueAtTime(0, ctx.currentTime + t);
                    g.gain.linearRampToValueAtTime(0.3, ctx.currentTime + t + 0.02);
                    g.gain.linearRampToValueAtTime(0, ctx.currentTime + t + 0.12);
                    o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.13);
                });
            } catch (e) { }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const icon = document.getElementById('sound-icon');
            icon.setAttribute('data-lucide', soundEnabled ? 'volume-2' : 'volume-x');
            lucide.createIcons();
        }

        // ── TOAST
        function showToast(msg, borderColor = '#10b981') {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            t.style.borderLeftColor = borderColor;
            t.classList.remove('translate-y-24', 'opacity-0');
            t.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { t.classList.add('translate-y-24', 'opacity-0'); t.classList.remove('translate-y-0', 'opacity-100'); }, 3500);
        }

        // ── FILTER
        function setFilter(f, el) {
            currentFilter = f;
            document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderGrid(window._lastStates || {});
        }

        // ── TIMER
        function getElapsed(id) {
            const ts = orderTimestamps[id];
            return ts ? Math.floor((Date.now() - ts) / 1000) : 0;
        }
        function fmtTime(s) {
            return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
        }

        // ── FETCH
        async function fetchAll() {
            try {
                const [sr, or] = await Promise.all([
                    fetch(`${API}/dashboard/stats`),
                    fetch(`${API}/order/all_states`)
                ]);
                const stats = await sr.json();
                const states = await or.json();

                document.getElementById('stat-tables').textContent = stats.total_tables_active || 0;
                document.getElementById('stat-pending').textContent = stats.active_orders || 0;
                document.getElementById('stat-revenue').textContent = '₹' + (stats.revenue || 0);

                const cur = new Set(Object.keys(states).filter(k => Object.keys(states[k].confirmed || {}).length));
                for (const k of cur) {
                    if (!prevOrderKeys.has(k)) {
                        orderStatuses[k] = orderStatuses[k] || 'new';
                        orderTimestamps[k] = orderTimestamps[k] || Date.now();
                        checkedItems[k] = checkedItems[k] || new Set();
                        playBeep();
                        showToast(`🔔 New order — Table ${k.replace('table_', '')}`);
                    }
                }
                for (const k of prevOrderKeys) {
                    if (!cur.has(k)) {
                        delete orderStatuses[k];
                        delete orderTimestamps[k];
                        delete checkedItems[k];
                    }
                }
                prevOrderKeys = cur;

                let cntNew = 0, cntPrep = 0, cntReady = 0, totItems = 0;
                for (const k of cur) {
                    const st = orderStatuses[k] || 'new';
                    if (st === 'new') cntNew++;
                    if (st === 'prep') cntPrep++;
                    if (st === 'ready') cntReady++;
                    totItems += Object.keys(states[k].confirmed || {}).length;
                }
                document.getElementById('cnt-new').textContent = cntNew;
                document.getElementById('cnt-prep').textContent = cntPrep;
                document.getElementById('cnt-ready').textContent = cntReady;
                document.getElementById('stat-items').textContent = totItems + itemsServedTotal;

                window._lastStates = states;
                renderGrid(states);
            } catch (e) { }
        }

        // ── RENDER
        function renderGrid(allStates) {
            const grid = document.getElementById('kds-grid');
            const active = Object.entries(allStates).filter(([, s]) => Object.keys(s.confirmed || {}).length > 0);
            const filtered = active.filter(([k]) => {
                if (currentFilter === 'all') return true;
                return (orderStatuses[k] || 'new') === currentFilter;
            });

            if (!filtered.length) {
                grid.innerHTML = `
            <div class="col-span-full flex flex-col items-center justify-center py-32 gap-4 text-slate-500">
                <div class="w-20 h-20 rounded-3xl bg-[#0d1626] flex items-center justify-center">
                    <i data-lucide="chef-hat" class="w-9 h-9 text-slate-600"></i>
                </div>
                <div class="text-center">
                    <h3 class="text-white font-bold text-lg">All Clear!</h3>
                    <p class="text-sm mt-1 max-w-xs">No active orders right now. Kitchen is ready.</p>
                </div>
            </div>`;
                lucide.createIcons(); return;
            }

            // Sort: urgent first, then by age
            filtered.sort(([a], [b]) => {
                const urgA = getElapsed(a) > 600 ? 1 : 0;
                const urgB = getElapsed(b) > 600 ? 1 : 0;
                if (urgA !== urgB) return urgB - urgA;
                return getElapsed(b) - getElapsed(a);
            });

            grid.innerHTML = filtered.map(([tid, state]) => buildCard(tid, state.confirmed)).join('');
            lucide.createIcons();
        }

        function buildCard(tableId, confirmed) {
            const status = orderStatuses[tableId] || 'new';
            const elapsed = getElapsed(tableId);
            const urgent = elapsed > 600;
            const checked = checkedItems[tableId] || new Set();
            const items = Object.entries(confirmed);
            const tNum = tableId.replace('table_', '');

            const statusBanner = {
                new: `<span class="px-2.5 py-1 rounded-lg bg-amber-500/10 text-amber-400 border border-amber-500/20 text-[10px] font-black uppercase tracking-wider">New Order</span>`,
                prep: `<span class="px-2.5 py-1 rounded-lg bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 text-[10px] font-black uppercase tracking-wider">Preparing</span>`,
                ready: `<span class="px-2.5 py-1 rounded-lg bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-[10px] font-black uppercase tracking-wider">Ready!</span>`,
            };

            const timerColor = elapsed > 600 ? 'text-rose-400 timer-alert' : elapsed > 300 ? 'text-amber-400' : 'text-emerald-400';
            const timerEmoji = elapsed > 600 ? '⚠️' : '⏱';

            const itemsHtml = items.map(([key, det]) => {
                const qty = det.quantity || 1;
                const addons = Array.isArray(det.addons)
                    ? det.addons.filter(Boolean)
                    : typeof det.addons === 'object' ? Object.entries(det.addons || {}).map(([k, v]) => `${k}: ${v}`) : [];
                const done = checked.has(key);
                const addonHtml = addons.length
                    ? addons.map(a => `<span class="px-2 py-0.5 rounded-md bg-white/5 border border-white/8 text-[10px] text-slate-400">${a}</span>`).join('')
                    : `<span class="px-2 py-0.5 rounded-md bg-white/5 border border-white/8 text-[10px] text-slate-600">Standard</span>`;

                return `
        <div class="flex items-start gap-3 p-3 rounded-xl bg-white/[0.025] border border-transparent hover:bg-white/[0.05] hover:border-white/10 transition-all mb-2 last:mb-0 ${done ? 'opacity-40' : ''}">
            <button onclick="toggleItem('${tableId}','${key}')"
                class="mt-0.5 w-5 h-5 rounded-md border-2 flex-shrink-0 flex items-center justify-center transition-all
                    ${done ? 'bg-emerald-500 border-emerald-500' : 'border-slate-600 hover:border-indigo-500'}">
                ${done ? '<svg class="w-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' : ''}
            </button>
            <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-xs font-black flex-shrink-0">${qty}</div>
            <div class="flex-1 min-w-0">
                <div class="font-bold text-sm text-white ${done ? 'line-through' : ''}">${key}</div>
                <div class="flex flex-wrap gap-1 mt-1">${addonHtml}</div>
            </div>
        </div>`;
            }).join('');

            const footerBtns = status === 'ready'
                ? `<button onclick="markServed('${tableId}')"
              class="flex-1 py-2.5 rounded-xl bg-emerald-500/15 text-emerald-400 border border-emerald-500/30 font-black text-sm flex items-center justify-center gap-2 hover:bg-emerald-500 hover:text-white transition-all">
              <i data-lucide="check" class="w-4"></i> Mark Served
           </button>`
                : status === 'prep'
                    ? `<button onclick="setStatus('${tableId}','ready')"
              class="flex-1 py-2.5 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-black text-sm flex items-center justify-center gap-2 hover:opacity-90 transition-all">
              <i data-lucide="bell-ring" class="w-4"></i> Ready to Serve
           </button>
           <button onclick="markServed('${tableId}')"
              class="px-4 py-2.5 rounded-xl bg-white/5 text-slate-400 border border-white/10 font-bold text-sm hover:text-white transition-all">Skip</button>`
                    : `<button onclick="setStatus('${tableId}','prep')"
              class="flex-1 py-2.5 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-black text-sm flex items-center justify-center gap-2 hover:opacity-90 transition-all">
              <i data-lucide="flame" class="w-4"></i> Start Preparing
           </button>
           <button onclick="markServed('${tableId}')"
              class="px-4 py-2.5 rounded-xl bg-white/5 text-slate-400 border border-white/10 font-bold text-sm hover:text-white transition-all">Dismiss</button>`;

            const cardBorder = urgent ? 'card-urgent' : `card-${status}`;

            return `
    <div class="order-card bg-[#0d1626] border border-white/[0.07] rounded-2xl overflow-hidden flex flex-col hover:shadow-2xl transition-all ${cardBorder}" id="card-${tableId}">
        <!-- Header -->
        <div class="px-5 pt-4 pb-3 border-b border-white/[0.07] flex items-center justify-between gap-2">
            <div>
                <div class="font-outfit font-black text-2xl text-white">Table ${tNum}</div>
                <div class="text-xs text-slate-500 mt-0.5">${items.length} item${items.length > 1 ? 's' : ''} · ${checked.size}/${items.length} done</div>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
                ${urgent ? `<span class="px-2.5 py-1 rounded-lg bg-rose-500/10 text-rose-400 border border-rose-500/20 text-[10px] font-black uppercase tracking-wider">URGENT</span>` : statusBanner[status]}
                <div class="flex items-center gap-1 font-outfit font-bold text-sm ${timerColor}">
                    <span>${timerEmoji}</span>
                    <span class="timer-val tabular-nums" data-table="${tableId}">${fmtTime(elapsed)}</span>
                </div>
            </div>
        </div>

        <!-- Items -->
        <div class="p-4 flex-1">${itemsHtml}</div>

        <!-- Footer -->
        <div class="px-4 pb-4 flex gap-2">${footerBtns}</div>
    </div>`;
        }

        // ── ACTIONS
        function toggleItem(tableId, itemKey) {
            if (!checkedItems[tableId]) checkedItems[tableId] = new Set();
            const s = checkedItems[tableId];
            s.has(itemKey) ? s.delete(itemKey) : s.add(itemKey);
            renderGrid(window._lastStates || {});
        }

        function setStatus(tableId, status) {
            orderStatuses[tableId] = status;
            if (status === 'ready') {
                playBeep();
                showToast(`✅ Table ${tableId.replace('table_', '')} — Order Ready!`, '#10b981');
            }
            renderGrid(window._lastStates || {});
        }

        async function markServed(tableId) {
            const confirmed = ((window._lastStates || {})[tableId] || {}).confirmed || {};
            itemsServedTotal += Object.keys(confirmed).length;
            showToast(`🍽️ Table ${tableId.replace('table_', '')} served!`, '#6366f1');
            await fetch(`${API}/order/reset?table_id=${tableId}`, { method: 'POST' });
            delete orderStatuses[tableId];
            delete orderTimestamps[tableId];
            delete checkedItems[tableId];
            fetchAll();
        }

        function forceRefresh() {
            document.getElementById('refresh-icon').style.animation = 'spin 0.6s linear';
            setTimeout(() => document.getElementById('refresh-icon').style.animation = '', 700);
            fetchAll();
        }

        // ── LIVE TIMERS (every second, no re-render)
        setInterval(() => {
            document.querySelectorAll('.timer-val[data-table]').forEach(el => {
                const tid = el.getAttribute('data-table');
                const e = getElapsed(tid);
                el.textContent = fmtTime(e);
                const color = e > 600 ? 'text-rose-400 timer-alert' : e > 300 ? 'text-amber-400' : 'text-emerald-400';
                const timer = el.closest('div.flex');
                if (timer) timer.className = `flex items-center gap-1 font-outfit font-bold text-sm ${color}`;
                if (e > 600) document.getElementById(`card-${tid}`)?.classList.add('card-urgent');
            });
        }, 1000);

        // ── POLL
        setInterval(fetchAll, 3000);
        window.onload = fetchAll;
    </script>

</body>

</html>
