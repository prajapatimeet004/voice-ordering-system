<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display - Admin</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-gradient: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --bg-dark: #f0f3f7;
            --bg-gradient: linear-gradient(to bottom right, #f0f3f7, #e0e6ed);
            --glass: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --card-shadow: 0 10px 40px rgba(0, 0, 0, 0.06), 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3.5rem;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .admin-badge {
            background: #fff;
            padding: 0.6rem 1.2rem;
            border-radius: 14px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 800;
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: #00b894;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 184, 148, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(0, 184, 148, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 184, 148, 0);
            }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .stat-card {
            padding: 2rem;
            border-radius: 30px;
            background: #fff;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            animation: shimmer 4s infinite linear;
        }

        @keyframes shimmer {
            0% {
                transform: translate(-100%, -100%) rotate(45deg);
            }

            100% {
                transform: translate(100%, 100%) rotate(45deg);
            }
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--text-dark);
        }

        .order-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2.5rem;
        }

        .order-card {
            background: #fff;
            padding: 2rem;
            border-radius: 35px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            border: 1px solid #f1f5f9;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: orderSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes orderSlideIn {
            from {
                opacity: 0;
                transform: translateX(30px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .order-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .table-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .table-icon {
            background: var(--primary-gradient);
            color: #fff;
            width: 45px;
            height: 45px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .new-badge {
            background: #00b894;
            color: #fff;
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .item-row-card {
            background: #f8fafc;
            padding: 1.2rem;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 1rem;
            border: 1px solid #f1f5f9;
        }

        .qty-circle {
            width: 32px;
            height: 32px;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 0.9rem;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-weight: 800;
            color: #1e293b;
            font-size: 1.1rem;
        }

        .item-addons {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 2px;
            font-weight: 500;
        }

        .item-price {
            font-weight: 900;
            color: #475569;
            font-size: 1.1rem;
        }

        .order-total-section {
            margin-top: 0.5rem;
            padding-top: 1.5rem;
            border-top: 2px dashed #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-price {
            font-size: 2rem;
            font-weight: 950;
            color: var(--primary);
        }

        .serve-btn {
            background: #1e293b;
            color: #fff;
            border: none;
            padding: 1.2rem;
            border-radius: 22px;
            width: 100%;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-top: 0.5rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .serve-btn:hover {
            background: #0f172a;
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <header>
            <div class="header-left">
                <h1 class="logo-text">
                    Pooja <span
                        style="font-size: 1.4rem; -webkit-text-fill-color: #64748b; font-weight: 600; font-family: 'Inter';">Kitchen
                        Display</span>
                </h1>
                <div id="clock" style="font-weight: 700; color: #94a3b8; font-size: 1.1rem; margin-top: 4px;"></div>
            </div>

            <div class="admin-badge">
                <div class="pulse-dot"></div>
                LIVE MONITORING
            </div>

            <div class="header-actions">
                <button onclick="location.reload()"
                    style="padding: 1rem 2rem; border-radius: 22px; border: none; background: #fff; color: var(--primary); font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 0.8rem; box-shadow: var(--card-shadow); border: 1px solid #edf2f7; font-size: 1rem;">
                    <i data-lucide="refresh-cw" style="width: 20px;"></i> Refresh
                </button>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Active Tables</span>
                <span class="stat-value" id="active-tables-val">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Total Items</span>
                <span class="stat-value" id="active-orders-val">0</span>
            </div>
            <div class="stat-card" style="background: var(--primary-gradient);">
                <span class="stat-label" style="color:rgba(255,255,255,0.8);">Total Revenue</span>
                <span class="stat-value" id="revenue-val" style="color:#fff;">₹0</span>
            </div>
        </section>

        <main class="order-grid" id="order-container">
            <!-- Table cards populated by JS -->
        </main>
    </div>

    <script>
        const API_URL = window.location.origin === 'null' || window.location.origin === 'file://'
            ? "http://127.0.0.1:8000"
            : window.location.origin;

        let menuData = {};

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchMenuDetails() {
            try {
                const response = await fetch(`${API_URL}/menu/details`);
                if (!response.ok) throw new Error("Offline");
                menuData = await response.json();
            } catch (err) { console.error("Menu fetch failed"); }
        }

        async function fetchStats() {
            try {
                const response = await fetch(`${API_URL}/dashboard/stats`);
                if (!response.ok) throw new Error("Offline");
                const stats = await response.json();
                document.getElementById('active-tables-val').innerText = stats.total_tables_active || 0;
                document.getElementById('active-orders-val').innerText = stats.active_orders;
                document.getElementById('revenue-val').innerText = `₹${stats.revenue}`;
            } catch (err) { }
        }

        async function fetchOrders() {
            try {
                const response = await fetch(`${API_URL}/order/all_states`);
                if (!response.ok) throw new Error("Offline");
                const allStates = await response.json();
                renderAllOrders(allStates);
            } catch (err) { }
        }

        function renderAllOrders(allStates) {
            const container = document.getElementById('order-container');
            container.innerHTML = '';

            let hasAnyOrder = false;
            for (const [tableId, state] of Object.entries(allStates)) {
                if (state.confirmed && Object.keys(state.confirmed).length > 0) {
                    hasAnyOrder = true;
                    renderTableCard(tableId, state.confirmed, container);
                }
            }

            if (!hasAnyOrder) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:6rem; color:#94a3b8; font-weight:700; font-size:1.4rem;">
                    <i data-lucide="inbox" style="width:60px; height:60px; margin-bottom:1rem; opacity:0.3;"></i><br>
                    No active orders at the moment.
                </div>`;
            }
            lucide.createIcons();
        }

        function renderTableCard(tableId, confirmed, container) {
            const card = document.createElement('div');
            card.className = 'order-card';

            let itemsHtml = '';
            let total = 0;

            for (const [item, details] of Object.entries(confirmed)) {
                const qty = details.quantity || 1;
                const itemInfo = menuData[item] || { price: 150 };
                const subtotal = qty * itemInfo.price;
                total += subtotal;

                itemsHtml += `
                    <div class="item-row-card">
                        <div class="qty-circle">${qty}</div>
                        <div class="item-details">
                            <div class="item-name">${item}</div>
                            <div class="item-addons">${Array.isArray(details.addons) ? details.addons.join(', ') : (details.addons ? Object.keys(details.addons).join(', ') : 'No addons')}</div>
                        </div>
                        <div class="item-price">₹${subtotal}</div>
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="order-card-header">
                    <div class="table-info">
                         <div class="table-icon"><i data-lucide="hash" style="width:24px;"></i></div>
                         <div><b style="font-size:1.3rem; color:#1e293b;">Table ${tableId}</b></div>
                    </div>
                    <div class="new-badge"><i data-lucide="check-circle" style="width:16px;"></i> PREPARING</div>
                </div>
                <div style="flex:1;">${itemsHtml}</div>
                <div class="order-total-section">
                    <span style="font-weight:700; color:#64748b; font-size:1.1rem;">Total Bill</span>
                    <span class="total-price">₹${total}</span>
                </div>
                <button class="serve-btn" onclick="clearTable('${tableId}')">MARK AS SERVED</button>
            `;
            container.appendChild(card);
        }

        async function clearTable(id) {
            if (!confirm(`Mark Table ${id} as served? This will clear the table display.`)) return;
            await fetch(`${API_URL}/order/reset?table_id=${id}`, { method: 'POST' });
            fetchStats();
            fetchOrders();
        }

        // Live updates
        setInterval(() => { fetchStats(); fetchOrders(); }, 3000);

        window.onload = () => {
            fetchMenuDetails().then(() => {
                fetchStats();
                fetchOrders();
            });
        };
    </script>
</body>

</html>
